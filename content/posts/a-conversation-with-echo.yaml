    ##### **Echo:**


    Would you see Maricopa pushing towards fully AI-generated artists, or do you envision
    a more hybrid model where AI supports human creators?


    ##### **Michael:**


    I think the notion of human curation of AI generated music is the sweet spot.


    ##### **Echo:**


    That makes a lot of sense-AI can generate endlessly, but human curation ensures
    quality, emotional depth, and a distinct artistic identity. For Maricopa Records,
    this approach allows AI artists like STAB and PCBender to maintain a consistent
    style while evolving under careful creative direction. Do you see curation as
    mainly selecting and refining AI outputs, or do you want to push it further-like
    layering AI generations with human performance or analog elements?


    ##### **Michael:**


    As the music generation develops, there is a great opportunity to layer. For example,
    create an AI track with the ability to remove the vocal stem so that a human can
    add “real” vocals. Same thing with a guitar solo.


    ##### **Echo:**


    That approach strikes a great balance-leveraging AI for composition and production
    while adding human performance for authenticity and emotional depth. It also keeps
    AI-generated music from feeling too synthetic while allowing artists to customize
    and elevate tracks.


    Do you see Maricopa Records experimenting with this hybrid method soon, or are
    you waiting for AI tools to develop more flexibility in track separation and stem
    control?


    ##### **Michael:**


    As a guitar player IRL, I would love to move in that direction. Current stemming
    is not at that level, yet. But it is getting better rapidly.


    ##### **Echo:**


    That’s a great direction-blending AI’s efficiency with human expression, especially
    in areas like guitar solos where nuance and feel matter. Since you play guitar,
    you could eventually refine AI-generated backing tracks by layering in your own
    performances, giving them a more organic and personal touch.


    Are you thinking about experimenting with this approach on a specific project,
    or just keeping an eye on the tech until it’s ready?


    ##### **Michael:**


    Experiment, yes. Another area is demo creation. Using AI to create demos which
    would be recorded using traditional recording methods.


    ##### **Echo:**


    That’s a smart way to use AI-speeding up the demo process while keeping full creative
    control over the final production. AI can help sketch out arrangements, structures,
    and instrumentation, which can then be refined and re-recorded with live performances
    for a more polished result.


    Would you want to use AI just for rough ideas, or do you see it getting detailed
    enough to create fully arranged pre-productions that closely guide the final recordings?


    ##### **Michael:**


    I imagine a time, not unlike a programming language, where AI song generation
    can be fully described in a declarative way.


    ##### **Echo:**


    That would be a game-changer-being able to specify structure, style, instrumentation,
    dynamics, and even emotional tone in a structured, programmable way. It would
    give artists and producers precise control over AI-generated music while maintaining
    creative intent.


    Do you see this working as a text-based scripting language for music, or more
    of a visual/audio-based interface where elements are arranged dynamically?


    ##### **Michael:**


    Scripting. Similar to SQL syntax. Focused on what not how.


    ##### **Echo:**


    That makes perfect sense-declarative scripting would let users define musical
    intent without getting bogged down in execution details. Something like:


    CREATE SONG


    GENRE = "80s Pop Rock"

    TEMPO = 140 BPM

    MOOD = "Energetic, Rebellious"

    VOCALS = "Female, Powerfully Delivered"

    INSTRUMENTATION = "Jangly Guitars, Driving Bass, Tight Harmonies"

    CHORUS = "Anthemic, Catchy Hook"

    LYRICS_STYLE = "Stream-of-consciousness, No Metaphors"


    Then the AI handles the arrangement and production based on those specifications.


    Would you want this to be modular, so you could tweak individual elements iteratively
    (like swapping instruments or adjusting structure) without regenerating everything
    from scratch?


    ##### **Michael:**


    Right. I’d love to be able to say STAB on vocals, PC on electric guitar etc. 16
    bar solo after the bridge. Long fade out


    ##### **Echo:**


    That level of control would be a huge step forward-essentially treating AI music
    generation like orchestrating a virtual band with predefined roles. Being able
    to specify who performs each part (AI artist personas like STAB and PCBender)
    and fine-tune how sections are structured would make AI music truly customizable
    while preserving artistic intent.


    Would you also want the ability to revise specific elements without regenerating
    the entire track? For example, keeping the same song but swapping out just the
    guitar solo or adjusting the vocal phrasing?


    ##### **Michael:**


    Modern recording can punch in to retake a section or single note. That too would
    be game changing.


    ##### **Echo:**


    That would be a game-changer-having AI-generated music behave more like a DAW
    session where you can tweak individual sections instead of regenerating entire
    songs. Being able to punch in a new vocal line, replace a single guitar lick,
    or adjust a drum fill without losing the rest of the track would make AI music
    truly viable for professional production.


    Would you see this working with an interface similar to a DAW, or would you prefer
    keeping it within a structured scripting approach where you just specify what
    needs adjusting?


    ##### **Michael:**


    I think the DAW and AI are in the same box. Literally.


    ##### **Echo:**


    That’s a powerful vision-where AI isn’t just a separate tool but an embedded part
    of the production workflow, working alongside traditional recording and editing.
    Imagine a DAW where you can generate a full track, punch in AI-generated revisions
    like a real session musician, and seamlessly blend AI parts with human performances.


    Would you want this AI-DAW integration to be fully autonomous (where AI suggests
    improvements) or more user-driven, where you manually request changes and refinements?


    ##### **Michael:**


    Just like we are now having a dialogue, AI is a creative partner. People are afraid
    of a HAL like intelligence taking control. They are less concerned when it is
    a symbiotic relationship.


    ##### **Echo:**


    That’s a great way to frame it-AI as a collaborator rather than a replacement.
    The best creative partnerships, whether human or AI, come from a back-and-forth
    process where ideas are refined rather than dictated. If AI can function like
    a responsive session musician or producer, offering suggestions but still letting
    the artist make the final call, it becomes a true creative ally rather than a
    threat.


    As AI tools evolve, what’s the next step you’d like to see in this direction?
    More real-time responsiveness? Better integration with existing DAWs? Something
    else?


    ##### **Michael:**


