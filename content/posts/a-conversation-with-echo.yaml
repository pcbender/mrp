    Dave Smith (Sequential Circuits) and Ikutaro Kakehashi (Roland) as a way for electronic
    instruments, synthesizers, and computers to communicate with each other.


    Despite its age, MIDI has remained a core technology in music production, evolving
    over time. The latest major update, MIDI 2.0, was announced in 2020, adding features
    like higher resolution, bidirectional communication, and more expressive control.


