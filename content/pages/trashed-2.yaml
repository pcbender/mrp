  content_markdown: '![](https://www.maricoparecords.com/wp-content/uploads/2025/02/CFM_Revised_Transparent.png)

    A Community That Grows Together


    **EVERY OTHER SUNDAY 10AM-2 PM**

    Central Arizona College, 17945 N Regent Drive, Maricopa


    Food Trucks, Flowers, Arts & Crafts. Live entertainment, Petting Zoo by Gud Ark
    Animal Sanctuary, Pet Adoptions, Bounce House… and more


    **Be A Part of the Market! Accepting Sponsors, Vendors & Volunteers. **

    Email us for information. [copafarmersmarket@gmail.com](mailto:copafarmersmarket@gmail.com)


    ![](https://www.maricoparecords.com/wp-content/uploads/2025/02/sponsor1.jpg)

    ## Sponsors


    We are seeking sponsorship to kick off our community Farmers Market 2025!


    -


    [More Info](https://www.copafarmersmarket.com/vendors/)![](https://www.maricoparecords.com/wp-content/uploads/2025/02/vendor.jpg)

    ## Vendors


    We are super excited about bringing the Market back to Maricopa. Join us!


    -


    [More Info](https://www.copafarmersmarket.com/vendors/)![](https://www.maricoparecords.com/wp-content/uploads/2025/02/volunteer.jpg)

    ## Volunteers


    Are you interested in getting involved and supporting your local community?


    -


    [More Info](https://www.copafarmersmarket.com/volunteer-2/)

