  content_html: "<h2>Tits Up (Remix)</h2><p>A <strong>scorching, no-holds-barred breakup\
    \ anthem</strong>, <strong>&quot;Tits Up (STAB Remix)&quot;</strong>is a fiery,\
    \ <strong>revenge-fueled rock banger</strong>packed with unapologetic attitude,\
    \ blistering guitars, and a beat that hits like a punch to the gut.</p><p>From\
    \ the <strong>spoken-word intro</strong>, delivered through a <strong>radio-call\
    \ effect</strong>, the song throws listeners straight into the wreckage of a <strong>cheating\
    \ scandal gone wrong</strong>. The verses lay down the <strong>cold, hard truth</strong>\u2014\
    <strong>lies exposed, bags packed, and no second chances.</strong>With <strong>STAB\u2019\
    s fierce vocal delivery</strong>, every lyric lands with <strong>venom and finality</strong>,\
    \ making it clear that the betrayal was the last straw.</p><p>The <strong>chorus\
    \ is an electrified battle cry</strong>, with <strong>pounding drums and roaring\
    \ guitars</strong>amplifying the fury: <em>&quot;It\u2019s tits up, you\u2019\
    re outta luck / Took my heart and fucked it up.&quot;</em>No more tears, no more\
    \ fights\u2014just <strong>pure, relentless dismissal</strong>. The remix\u2019\
    s <strong>hard-hitting production</strong>adds a <strong>gritty edge</strong>,\
    \ blending <strong>distorted synths, heavy bass, and raw, in-your-face guitar\
    \ riffs</strong>to push the energy to its max.</p><p>By the <strong>bridge</strong>,\
    \ there\u2019s no room for regret\u2014only brutal honesty: <em>&quot;Don\u2019\
    t call me drunk, I\u2019ve blocked your calls. / I don\u2019t forgive, I won\u2019\
    t go back.&quot;</em>And just when you think the song has delivered its final\
    \ blow, the outro lands with an <strong>unapologetically savage twist</strong>that\
    \ cements <strong>STAB\u2019s signature rebellious bite</strong>.</p><p>With its\
    \ <strong>explosive instrumentation, cutting lyrics, and riotous energy</strong>,\
    \ <em>&quot;Tits Up (STAB Remix)&quot;</em>is an <strong>anthem for anyone who\u2019\
    s ever been wronged\u2014and decided to walk away with their head held high and\
    \ their middle finger raised.</strong></p><a href=\"https://open.spotify.com/track/3QZm7yiPWckKCOzHC678xK?si=260d0a8b935946bb\"\
