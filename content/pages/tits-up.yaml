  content_markdown: "## Tits Up\n\nA **scorching, no-holds-barred breakup anthem**,\
    \ **\"Tits Up\"**is a fiery, **revenge-fueled rock banger**packed with unapologetic\
    \ attitude, blistering guitars, and a beat that hits like a punch to the gut.\n\
    \nFrom the **spoken-word intro**, delivered through a **radio-call effect**, the\
    \ song throws listeners straight into the wreckage of a **cheating scandal gone\
    \ wrong**. The verses lay down the **cold, hard truth**\u2014**lies exposed, bags\
    \ packed, and no second chances.**With **STAB\u2019s fierce vocal delivery**,\
    \ every lyric lands with **venom and finality**, making it clear that the betrayal\
    \ was the last straw.\n\nThe **chorus is an electrified battle cry**, with **pounding\
    \ drums and roaring guitars**amplifying the fury: _\"It\u2019s tits up, you\u2019\
    re outta luck / Took my heart and fucked it up.\"_No more tears, no more fights\u2014\
    just **pure, relentless dismissal**. The remix\u2019s **hard-hitting production**adds\
    \ a **gritty edge**, blending **distorted synths, heavy bass, and raw, in-your-face\
    \ guitar riffs**to push the energy to its max.\n\nBy the **bridge**, there\u2019\
    s no room for regret\u2014only brutal honesty: _\"Don\u2019t call me drunk, I\u2019\
    ve blocked your calls. / I don\u2019t forgive, I won\u2019t go back.\"_And just\
    \ when you think the song has delivered its final blow, the outro lands with an\
    \ **unapologetically savage twist**that cements **STAB\u2019s signature rebellious\
    \ bite**.\n\nWith its **explosive instrumentation, cutting lyrics, and riotous\
    \ energy**, _\"Tits Up\"_is an **anthem for anyone who\u2019s ever been wronged\u2014\
    and decided to walk away with their head held high and their middle finger raised.**\n\
    \n[](https://open.spotify.com/album/0IoEeIcaODtw3OlwdWaRXH?si=LnYwoqi3Tm6EWwTiiqabgA)[](https://music.apple.com/us/album/t-s-up/1793838944?i=1793838945)[](https://music.youtube.com/playlist?list=OLAK5uy_nz7_qj4OhoRgLW0uhkyPswjMG3eeWgG-A&si=3hESP6rM7GoVPWYk)![](https://www.maricoparecords.com/wp-content/uploads/2025/02/Tits-Up.png)"
