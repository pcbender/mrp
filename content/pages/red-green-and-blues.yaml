  content_html: "<h2>Red, Green and Blues</h2><p>A soulful blend of blues, rock, jazz,\
    \ <em>Red, Green and Blues</em>is an instrumental vision of a box of colors. Beautiful\
    \ guitar and keyboard performances weave melody, rhythm and style into every musical\
    \ color. Supported by the Maricopa Players rhythm section, each track pulses with\
    \ groove and style.</p><p>From the funky opener <strong>\u201CCyclamen\u201D</strong>to\
    \ the jazzy energy of <strong>\u201COlivine,\u201D</strong>and the laid back groove\
    \ of <strong>\u201CSunray,\u201D</strong>the album flows effortlessly, capturing\
    \ the moods and moments of each season. PCBender&#x27;s <em>Red, Green and Blues</em>is\
    \ a soundscape where every song leaves a lasting mood. And with <strong>\u201C\
    Moonstone\u201D</strong>closing the album, you have an instant cure for the blues.</p><p>Whatever\
    \ color fits your mood, <em>Red, Green and Blues</em>is your brush, painting a\
    \ musical canvas sure to move you.</p><a href=\"https://open.spotify.com/album/7r361vipWtjpzbGoEf2Cdm?si=NjqZASwbREWuzJJjwwzrIQ\"\
