  content_html: "<h2>Umbra Ala</h2><p>With &quot;<em>Umbra Ala</em>&quot;, <strong>4Castle\
    \ </strong>steps into mythic territory, delivering a powerful, theatrical rock\
    \ track that feels both ancient and immediate. Told from the perspective of a\
    \ mysterious gatekeeper between worlds, the song weaves mysticism, temptation,\
    \ and fate into a sweeping sonic experience.</p><p>Driven by commanding vocals,\
    \ rich harmonies, and an epic arrangement, &quot;<em>Umbra Ala</em>&quot; is more\
