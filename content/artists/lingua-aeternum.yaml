  bio_short: '**Lingua Aeternum is not a band. It is a circle. A rite. A resonance.**'
  bio_long: "## Lingua Aeternum\n\n**Lingua Aeternum is not a band. It is a circle.\
    \ A rite. A resonance.**\n\nDrawn from the deep well of myth, mathematics, and\
    \ memory, Lingua Aeternum conjures sound as invocation\u2014music as sacred act.\
    \ Each composition is a Canto: a sung glyph, a spell etched in breath and vibration.\
    \ The performers are not musicians but Cantors\u2014practitioners of the Harmonic\
    \ Algebraic Language of Alignment (HALA), where melody is meaning, rhythm is ritual,\
    \ and silence speaks louder than words.\n\nTheir music defies genre. You may hear\
    \ echoes of post-rock, ambient drone, ancient chants, or electronic pulses\u2014\
    but no label holds. Instead, the listener is drawn inward, through spiraling harmonics\
    \ and layered whispers, toward a place beyond translation. This is not art for\
    \ consumption. It is art for **transformation**.\n\nLingua Aeternum records under\
    \ the guidance of Maricopa Records, but they do not record songs\u2014they distill\
    \ **intentions**, encoded through the Wheel, spoken into being by resonance alone.\n\
    \n- To hear is to remember.\n\n- To remember is to become.\n\n- _Let the glyphs\
    \ guide you._\n\n[](https://open.spotify.com/artist/4Ivof5fKiBE9wbz6ArgZzd?si=HYePmTM3TtCaN-P1PFFYlQ)[](https://music.apple.com/us/artist/lingua-aeternum/1809011711)[](https://www.youtube.com/channel/UCzrA7rNe15AiX1LXZTGUQqg)![](https://www.maricoparecords.com/wp-content/uploads/2025/04/LA_Profile_square.png)\n\
    ## Releases"
