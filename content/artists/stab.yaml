  promo_blurb: STAB channels the electric pulse of '80s pop-rock, fusing jangly guitars
    and driving basslines into high-energy anthems with a rebellious edge. Her recent
    work showcases a compelling artistic range, moving from myth-making to raw confession.
    The single ["Raven Dark"](/releases/raven-dark/) builds from ambient electronics
    into a powerful, ritualistic chant, demonstrating her ambitious scope. In contrast,
    ["June Gloom"](/releases/june-gloom/) turns frustration into a cathartic sing-along,
    capturing a restless energy that explodes in its chorus. On the more introspective
    ["Just A Waste Of Tears"](/releases/just-a-waste-of-tears/), she explores a colder,
    more controlled sound where emotional resignation becomes a potent hook. STAB
    is a commanding voice in modern rock, crafting songs that are both unapologetically
    fierce and deeply resonant.
