  bio_long: "## STAB\n\nSTAB isn\u2019t just a name\u2014it\u2019s a statement. A\
    \ sonic force of nature, she channels the electric pulse of '80s pop-rock, fusing\
    \ jangly guitars, driving basslines, and tight harmonies into anthems that hit\
    \ hard and leave a mark. Bold, confident, and unapologetically fierce, STAB delivers\
    \ high-energy hooks with a rebellious edge, embracing the raw, unfiltered spirit\
    \ of rock.\n\nHer music is a love letter to the golden age of girl bands, blending\
    \ the infectious melodies of The Bangles with the gritty attitude of The Runaways.\
    \ Whether she\u2019s tearing through anthemic choruses, throwing down sharp riffs,\
    \ or tapping into her softer, more introspective side, STAB\u2019s voice is unmistakable\u2014\
    powerful yet effortlessly cool.\n\nA signature artist under Maricopa Records,\
    \ STAB thrives in the space where analog warmth meets AI-driven creativity, pushing\
    \ boundaries while staying true to the timeless essence of rock 'n' roll. She\u2019\
    s not here to follow trends\u2014she\u2019s here to carve her own path, one catchy,\
    \ defiant, and undeniably addictive track at a time.\n\nIf you\u2019re looking\
    \ for music that hits like a lightning bolt and stays in your head for days\u2014\
    STAB is already in your veins.\n\n[](https://open.spotify.com/artist/7zZ7MxU20RZAw2E1w4EsaE)[](https://music.apple.com/us/artist/stab/1495050512)[](https://music.youtube.com/channel/UCQkfMbYRs06q_SFW5PPSvWw)![](https://www.maricoparecords.com/wp-content/uploads/2025/02/STAB.jpg)\n\
    ## Releases"
