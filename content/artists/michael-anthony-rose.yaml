  promo_blurb: Michael Anthony Rose writes profoundly human songs that look time squarely
    in the eye. His unflinching, confessional lyrics transform the quiet moments of
    life and loss into statements of stark, honest detail, exploring aging, memory,
    and the search for durable truth. His latest album, [*I'm Still Here*](/releases/i-m-still-here/),
    is a work of deliberate stock-taking from a writer with nothing to hide. The record
    is anchored by recent singles that showcase his range, from the patient intimacy
    of ["Entraining"](/releases/entraining/) to the driving, full-throated confidence
    of ["Live Forever Or Die Trying"](/releases/live-forever-or-die-trying/), a powerful
    reckoning with the meaning of legacy. This is music for anyone who wants to feel
    seen in their own complex story, offering a clear-eyed look at the moments that
    define a life.
