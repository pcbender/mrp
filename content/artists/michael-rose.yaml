  promo_blurb: Michael Rose is a sharp-witted musical ringmaster whose songs build
    worlds populated by cynical saints and scheming sinners. With the keen eye of
    a storyteller, he uses vivid, cinematic metaphors to dissect the systems we inhabit,
    creating an unsettling spectacle that challenges listeners to find their reflection.
    His latest single, ["Biff Knocker"](/releases/biff-knocker/), puts this vision
    on full display, framing the circus as a rigged moral economy where everyone is
    working an angle. A relentless, big-band energy propels the song forward as Rose
    turns the tables on the listener, revealing that the audience is the real main
    attraction. It’s a compelling invitation into a world where you might not like
    what you see in the mirror. Step right up and find your place in the crowd.
