    \ stk-block-heading--v2 stk-block stk-090a45f\" id=\"ci\" data-block-id=\"090a45f\"\
    ><style>.stk-090a45f .stk-block-heading__text{font-weight:600 !important;font-family:\"\
    Lato\", Sans-serif !important;}</style><h2 class=\"stk-block-heading__text\">Have\
    \ A Heart</h2></div>\n<!-- /wp:stackable/heading -->\n\n<!-- wp:stackable/text\
    \ {\"uniqueId\":\"87e1322\"} -->\n<div class=\"wp-block-stackable-text stk-block-text\
    \ stk-block stk-87e1322\" data-block-id=\"87e1322\"><p class=\"stk-block-text__text\"\
    >A <strong>melancholic yet heartfelt plea for love and commitment</strong>, <strong>\"\
    Have a Heart\"</strong> captures the emotional push-and-pull of <strong>longing\
    \ for someone who won\u2019t fully give in</strong>. With <strong>smooth, melodic\
    \ guitar work, a warm analog feel, and PCBender\u2019s signature introspective\
    \ delivery</strong>, the song blends <strong>classic rock balladry with aching\
    \ sincerity</strong>.</p></div>\n<!-- /wp:stackable/text -->\n\n<!-- wp:paragraph\
    \ -->\n<p>The verses are <strong>simple yet deeply personal</strong>, setting\
    \ the stage for a <strong>relationship caught in limbo</strong>\u2014a love that\u2019\
    s there, but only <strong>part-time</strong>. The <strong>pre-chorus</strong>\
    \ wrestles with the contradictions of feeling <strong>wanted yet unsatisfied</strong>,\
    \ building into the song\u2019s <strong>soul-searching chorus</strong>:<br><em>\"\
    Have a heart. If you want me, will you have a heart?\"</em></p>\n<!-- /wp:paragraph\
    \ -->\n\n<!-- wp:paragraph -->\n<p>Backed by <strong>expressive guitar solos and\
    \ swelling instrumentation</strong>, the song\u2019s structure mirrors <strong>the\
    \ emotional rollercoaster of waiting, hoping, and questioning</strong>. As the\
    \ <strong>final chorus fades</strong>, the lingering repetition of <em>\"Have\
    \ a heart\"</em> leaves listeners with a sense of <strong>wistful uncertainty</strong>\u2014\
    a love that still waits for an answer.</p>\n<!-- /wp:paragraph -->\n\n<!-- wp:paragraph\
    \ -->\n<p>With <strong>its laid-back yet emotionally charged style</strong>, <strong>\"\
    Have a Heart\"</strong> is a <strong>timeless ballad for anyone who\u2019s ever\
    \ wanted more than just a piece of someone\u2019s love.</strong></p>\n<!-- /wp:paragraph\
    \ -->\n\n<!-- wp:stackable/button-group {\"uniqueId\":\"6e42381\"} -->\n<div class=\"\
