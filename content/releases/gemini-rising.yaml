    lyrics_text: "I change my mind like seasons cross the sky\nOne minute laughing,\
      \ next I wonder why\nI pose questions that are never asked\nAnd forget the answers\
      \ just as fast\n\nDon't try to pin me down, I won't be still\nI live on impulse,\
      \ powered by will\n\nI'm Gemini rising, chaos and grace\nA mirror with two different\
      \ faces\nI'm lightning wrapped in skin and bone\nToo wild to cage, too bright\
      \ alone\nI'm every version, all at once\nI burn, I dance, I don't explain\n\
      You'll never know me\u2014but love me anyway\n\nI read your soul before you\
      \ speak a word\nAnd tuck away the truths I never heard\nI crave connection,\
      \ then I vanish fast\nA future dreamer tied to nothing past\n\nI don't do \"\
      simple,\" I don't do \"same\"\nBut I will light your world aflame\n\nI'm Gemini\
      \ rising, storm and star\nA walking question, here you are\nI'm rhythm bent\
      \ around a thought\nA heart you almost\u2014but never quite\u2014caught\nI'm\
      \ air and fire in motion made\nI shimmer, vanish, love, and fade\n\nI'm the\
      \ whisper in your quiet\nThe spark that sets the riot\nA wave, a splash, a name\
      \ not wrong\nI don't stay still, I don't stay long\nI'm the girl behind the\
      \ glare\nWatch me disappear\u2014\nI was never really there\n\nI'm Gemini rising,\
      \ wild and true\nI'm everything\u2014especially not for you\nA thousand voices\
      \ in my head\nBut I speak the one I meant instead\nI'm every version, none are\
      \ wrong\nA burst of light that doesn't stay long\n\nA ripple, a spark, then\
      \ I'm gone\nA wave, a splash\u2014moving on"
