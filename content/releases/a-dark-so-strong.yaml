    lyrics_text: "I waited through the silence of the rain\nThe drops upon the window\
      \ know my name\nA trembling light refused to fade or flame-\nThe night still\
      \ whispered softly, \u201CAll the same.\u201D\n\nA morning song to chase the\
      \ grey away\nThe night too long to let it stay that way\nThe dawn is wrong,\
      \ the clouds delay its rays-\nA dark so strong it makes the day obey\u2026\n\
      A dark so strong\n\nThe mirror calls a tune I used to know-\nExposing the light\
      \ I lost so long ago\nMy shadow stays, but now I see its grace-\nA slow confession\
      \ warms this sun-spent place\n\nA morning song to chase the grey away\nThe night\
      \ too long to let it stay that way\nThe dawn is wrong, the clouds delay its\
      \ rays-\nA dark so strong it makes the day obey\u2026\nA dark so strong\n\n\
      The nighthawk\u2019s flight\nA screen too bright\nThe sky begins to bruise-\n\
      But there\u2019s nothing left to lose\n\nA morning song to chase the grey away\n\
      The night too long to let it stay that way\nThe dawn is wrong, the clouds delay\
      \ its rays-\nA dark so strong it makes the day obey\u2026\nA dark so strong\n\
      \nA dark so strong"
