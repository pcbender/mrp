    lyrics_text: "Apa\u2019s daughter stands before the Court of Opinion\nThe finest\
      \ minds, the trusted few\n\u201CI\u2019m told there\u2019s answers here. I am\
      \ Aletheion.\u201D\n\u201CHow does one know what\u2019s true?\u201D\n\nThe courtiers\
      \ all leaned forward, quick to make a case\nEach certain, each composed\nBut\
      \ every word rang brittle and too well rehearsed\nTheir pretense exposed\n\n\
      No wise man claims the truth\n\nAletheion\u2026\nWilling to tune\nTo adjust\n\
      To embrace dissonance\nAletheion\u2026\nResonance aligned with what is\u2026\
      \n\nApa\u2019s daughter silenced their answers\nNot in defiance, but in care\n\
      \u201CFor if I clutch a single answer\nI silence what isn\u2019t there.\u201D\
      \n\nShe released her own conviction\nLet one bright thread go slack\u2014\n\
      For a single string pulled tightly\nWill always answer back\n\nNo wise man claims\
