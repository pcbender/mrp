  description: "## Red, Green and Blues\n\nA soulful blend of blues, rock, jazz, _Red,\
    \ Green and Blues_is an instrumental vision of a box of colors. Beautiful guitar\
    \ and keyboard performances weave melody, rhythm and style into every musical\
    \ color. Supported by the Maricopa Players rhythm section, each track pulses with\
    \ groove and style.\n\nFrom the funky opener **\u201CCyclamen\u201D**to the jazzy\
    \ energy of **\u201COlivine,\u201D**and the laid back groove of **\u201CSunray,\u201D\
    **the album flows effortlessly, capturing the moods and moments of each season.\
    \ PCBender's _Red, Green and Blues_is a soundscape where every song leaves a lasting\
    \ mood. And with **\u201CMoonstone\u201D**closing the album, you have an instant\
    \ cure for the blues.\n\nWhatever color fits your mood, _Red, Green and Blues_is\
    \ your brush, painting a musical canvas sure to move you.\n\n[](https://open.spotify.com/album/7r361vipWtjpzbGoEf2Cdm?si=NjqZASwbREWuzJJjwwzrIQ)[](https://music.apple.com/us/album/red-green-and-blues/1798943883)[](https://music.youtube.com/playlist?list=OLAK5uy_mvvFrMOdE9HDWl4eNtR-kZM0Z-EvW39Go&si=XhMjGE72myN0vaks)![](https://www.maricoparecords.com/wp-content/uploads/2025/02/Reg-Green-and-Blues-Landr.png)\n\
    ## Tracks\n\n#\n\nTitle\n\nListen\n\n1\n\nCyclamen\n\n[](https://open.spotify.com/track/5OzR501NoPbQrUtMVUCUFY?si=5540b7a4981542b1)[](https://music.apple.com/us/album/cyclamen/1798943883?i=1798943884)[](https://music.youtube.com/watch?v=-NS70JZa5O8&si=DAtxNxVErseqKumy)\n\
    2\n\nTumbleweed\n\n[](https://open.spotify.com/track/6rhWrksNcgSgZA0WvMjsN9?si=46d0383b9f994272)[](https://music.apple.com/us/album/tumbleweed/1798943883?i=1798943885)[](https://music.youtube.com/watch?v=mc7saVI4IUU&si=2e9a77qayWMFO2Dr)\n\
