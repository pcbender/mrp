    lyrics_text: 'In love

      I couldn''t see the walls

      Only the candle

      Only the fall

      Of love

      I saved every sign

      The curve of a shoulder

      The hour, the wine


      In is a room

      Of is a ghost

      With is the road

      I needed most

      Time has a window

      Place has a door

      Direction is asking

      What love is for


      Say it slowly

      Say it true

      What am I

      Beside you

      Not your shadow

      Not your claim

      Just a hand

      Beside your name


      In love

      We vanished from view

      The city kept moving

      But I only knew you

      Of love

      We made our museum

      Tickets and photographs

      Proof we had been


      In is a room

      Of is a ghost

      With is the road

      I needed most

      Time has a window

      Place has a door

      Direction is asking

      What love is for


      Every sentence

      Needs somewhere to land

      Every silence

      Needs a hand

      Not behind you

      Not ahead

      Let the living

      Wake the dead


      With love

      There''s room to remain

      No golden forever

      No beautiful chain

      With love

      We move and we bend

      Not toward possession

      But toward what can mend


      In is a room

      Of is a ghost

      With is the road

      I needed most

      Time has a window

      Place has a door

      Direction is asking

      What love is for


      So let the old words

      Fall where they fall

      Love is not ownership

      Love is not all

      Love is the distance

      We still travel through

      In me, of me

      With me and you


      In love

      Of love

      With love'
