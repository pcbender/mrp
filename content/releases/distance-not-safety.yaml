  description: '## Distance Not Safety


    Maricopa Records proudly presents the debut album from **4Castle**, _Distance
    Not Safety_-a powerful fusion of progressive rock, intricate vocal harmonies,
    and masterful musicianship. With a lineup that blends fiery guitars, deep bass
    grooves, commanding drums, and lush keyboards, **4Castle **delivers a record that
    is as emotionally gripping as it is musically sophisticated.


    From the haunting storytelling of "**Cat’s Claw**" to the relentless energy of
    "**Belligerent**", the soaring melodies of "**The Dreamer and the Dreamed**",
    and the thought-provoking depths of "**Delusion of Truth**", _Distance Not Safety_is
    an album that refuses to be confined to a single sound. The title track, "**Distance
    Not Safety**", sets the tone with its tension and release, while "**Double Black
    Diamonds**" carves through with precision and intensity. Closing with the hopeful
    weight of "**Void of Intention**", the album leaves a lasting impression-unapologetic,
    bold, and unforgettable.


    This isn’t just a collection of songs-it’s a statement. A journey through sound
    and emotion, crafted by a band that thrives on pushing boundaries.


    ![](https://www.maricoparecords.com/wp-content/uploads/2025/03/5-rooks-in-a-dark-setting-1.png)

