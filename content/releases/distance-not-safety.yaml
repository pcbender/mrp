  description: "## Distance Not Safety\n\nMaricopa Records proudly presents the debut\
    \ album from **4Castle**, _Distance Not Safety_\u2014a powerful fusion of progressive\
    \ rock, intricate vocal harmonies, and masterful musicianship. With a lineup that\
    \ blends fiery guitars, deep bass grooves, commanding drums, and lush keyboards,\
    \ **4Castle **delivers a record that is as emotionally gripping as it is musically\
    \ sophisticated.\n\nFrom the haunting storytelling of \"**Cat\u2019s Claw**\"\
    \ to the relentless energy of \"**Belligerent**\", the soaring melodies of \"\
    **The Dreamer and the Dreamed**\", and the thought-provoking depths of \"**Delusion\
    \ of Truth**\", _Distance Not Safety_is an album that refuses to be confined to\
    \ a single sound. The title track, \"**Distance Not Safety**\", sets the tone\
    \ with its tension and release, while \"**Double Black Diamonds**\" carves through\
    \ with precision and intensity. Closing with the hopeful weight of \"**Void of\
    \ Intention**\", the album leaves a lasting impression\u2014unapologetic, bold,\
    \ and unforgettable.\n\nThis isn\u2019t just a collection of songs\u2014it\u2019\
    s a statement. A journey through sound and emotion, crafted by a band that thrives\
    \ on pushing boundaries.\n\n![](https://www.maricoparecords.com/wp-content/uploads/2025/03/5-rooks-in-a-dark-setting-1.png)\n\
    ## Tracks\n\n#\n\nTitle\n\nListen\n\n1\n\nCut Flowers\n\n[](https://open.spotify.com/track/2BQpFdLyixPI1bD7SOlnZy?si=5d6a071b37434674)[](https://music.apple.com/us/album/cut-flowers/1801053116?i=1801053117)\n\
    2\n\nDistance Not Safety\n\n[](https://open.spotify.com/track/1UsGrKVAYoJKCYAedQdp7V?si=76c2b39297194eaf)[](https://music.apple.com/us/album/distance-not-safety/1801053116?i=1801053118)\n\
