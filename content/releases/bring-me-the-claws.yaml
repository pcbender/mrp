    lyrics_text: 'Bring Me The Claws


      Send out the message

      Tell Dad it’s time

      Meet us at dawn

      Circle behind

      Scouts in the trees

      Move silent and fast

      Sky with no moon

      Advance to the last


      Bring me the claws


      We did not start

      But we will end

      Betrayed by one

      Once called a friend

      How many lost

      What is enough

      Never forget

      Death at the bluff


      Bring me the claws


      Still long shadows

      Moving down hill

      Crow and magpie

      All had their fill

      We pressed, they ran

      Brave and afraid

      Balance restored

      But no one saved


      Bring me the claws


      Bring me the claws


      Bring me the claws'
