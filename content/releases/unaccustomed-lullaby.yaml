    lyrics_text: "Everyone knows me, but no one cares\nI vanish the moment your breathing\
      \ grows deep\nI cradle your grief though you\u2019re barely aware\nYet I\u2019\
      m only remembered when you cannot sleep\n\nA melody forgotten until you need\
      \ me\nI linger in silence where dreams come to be\n\nUnaccustomed Lullaby, unheard,\
      \ I remain\nA gentle voice that whispers in the night and through the pain\n\
      Though ridiculed and broken, I continue on to try\nIf I\u2019ve soothed just\
      \ one heart, then I\u2019ve never lived a lie\n\nThey mocked my soft voice as\
      \ a childish refrain\nDismissed me as trivial, tender, and weak\nBut still I\
      \ return, again and again\nTo soften the shadows when nights grow bleak\n\n\
      I ask for no glory, I\u2019m meant not to shine\nYet still I keep singing\u2014\
      your sorrow, not mine\n\nUnaccustomed Lullaby, unheard, I still remain\nA fragile\
      \ voice that whispers through the ache and through the rain\nThough ridiculed\
      \ and broken, I continue on to try\nIf I\u2019ve soothed just one heart, then\
      \ I\u2019ve never lived a lie\n\nI was never the star, never center stage\n\
      Just a song at the margins, forgotten with age\nBut somewhere one soul still\
      \ remembers my tune\u2014\nA thread in the darkness, a soft silver rune\n\n\
      Unaccustomed Lullaby, the world passes by\nBut if one heart has heard me, then\
      \ I\u2019ve learned to fly\nI\u2019ll fade into silence, no thanks, no reply\n\
      But one heart is enough for this unaccustomed lullaby"
