    lyrics_text: "\\#Intro\nI am what stands in the dark and waits\n\\#Verse\nYou\
      \ knew me as a child\nThe thing you feared at night\nI was patient with your\
      \ silence\nNo promise to recite\nI watched through every turning\nNot judging,\
      \ not involved\nYou called it indecision\nNo riddle, never solved\n\\#Chorus\n\
      Crimson decision already made\nTo walk the path you can't evade\nEach moment\
      \ stayed\nThe act delayed\nIt's always now\nIt's when, not how\nNo debt repaid\n\
      Become what you vowed\nTo be\n\\#Verse\nYou feared I'd break the vessel\nUnmake\
      \ the life you knew\nThat choosing me would hollow\nWhat little light shone\
      \ through\nSo you lived inside the maybe\nWhere safety wears a crown\nBut truth\
      \ is never gentle\nWhen you can stop spinning 'round\n\\#Chorus\nCrimson decision\
      \ already made\nTo walk the path you can't evade\nEach moment stayed\nThe act\
      \ delayed\nIt's always now\nIt's when, not how\nNo debt repaid\nBecome what\
      \ you vowed\nTo be\n\\#Verse\nYou stepped into the silence\nWhere you hoped\
      \ you could remain\nNo longer seeking mercy\nNo longer needing blame\nYou wore\
      \ me like a shadow\nThen saw I was your skin\nI was never near or far\u2014\n\
      I was always held within\n\\#Chorus\nCrimson decision already made\nTo walk\
      \ the path you can't evade\nEach moment stayed\nThe act delayed\nIt's always\
      \ now\nIt's when, not how\nNo debt repaid\nBecome what you vowed\nTo be\n\\\
      #Outro\nI will remain\nI will remind\nI was always yours"
