    lyrics_text: "Hardwood Confessions\n(Acoustic narrative ballad \u2014 introspective\
      \ and reverent)\n\nMahogany deck on a summer day\nWe knew that sailing was the\
      \ only way\nWe\u2019ll build a sloop, a 32 footer\nBut why you left I can\u2019\
      t remember\n\n\u201CCherry Coke\u201D I called you then\nSummer\u2019s crush\
      \ made for exploring\nWe swore our love would ever last\nYou moved to someplace\
      \ overcast\n\nAn unexpected rosewood neck\nStrings so tight they hurt like heck\n\
      The girls came close to hear me play\nMy boyish voice would soon give way\n\n\
      He came from nothing, an emigree\nAnd built a life he could not foresee\nHe\
      \ farmed the land and built a home\nAnd set the seeds for what I\u2019ve become\n\
      \nOak chair creaked beneath his frame\nMy granddad\u2019s hands were hard with\
      \ blame\nBut in the silence after grace was said\nI saw a softness in the way\
      \ he bowed his head\n\nThese are my hardwood confessions\nWhere silence speaks\
      \ and echoes bend\nI learned from loss, I paid in questions\nBut every scar\
      \ still helps me mend\nTruth in timber, voice in grain\nThese hardwood confessions\
      \ still remain\n\nSo lay me down on floors that creak\nWhere every step still\
      \ lets me speak\nNo saint, no sinner, just a man\nBuilt from hardwood\u2026\
      \ best I can"
