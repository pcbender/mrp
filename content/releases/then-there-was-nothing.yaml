    lyrics_text: "I walked along a misty pier\nThe water dark, the sky unclear\nI\
      \ almost missed her standing there\nHalf-turned, with sea-salt in her hair\n\
      She moved too close and touched my head\n\u201CI\u2019m Nothing,\u201D she turned\
      \ and said\n\u201CI\u2019ve been waiting, longing for you.\u201D\nAnd strangely\
      \ now I felt it too\n\nI found a face I knew\nThere was nothing left to do\n\
      But dissolve into her force\nAs if I had a choice\nI surrender to her always\n\
      With a love that can not stay\nThere is Me and there is Nothing\nAnd may it\
      \ always be that way\n\nThen there was Nothing\u2014her voice in the air\nShe\
      \ didn\u2019t arrive, she was always there\nShe pulled me apart with a whisper,\
      \ a glance\nAnd gave back a soul that had lost its chance\nThen there was Nothing\u2014\
      no fear, no disguise\nJust love in the dark and light in her eyes\nNo questions,\
      \ no reason, no need to explain\nThen there was Nothing\u2014and Nothing remains\n\
      \nWe woke when dawn begins to breathe\nShe spoke in truths, she opened me\n\
      No promises, no binding thread\u2014\nJust moments blooming in my head\nShe\
      \ sang a name I used to wear\nThen let it vanish in the air\nShe kissed me once,\
      \ then stepped away\u2014\nAs if goodbye was how she\u2019d stay\n\nI found\
      \ a face I knew\nThere was nothing left to do\nBut dissolve into her force\n\
      As if I had a choice\nI surrender to her always\nWith a love that can not stay\n\
      There is Me and there is Nothing\nAnd may it always be that way\n\nThen there\
      \ was Nothing\u2014her voice in the air\nShe didn\u2019t arrive, she was always\
      \ there\nShe pulled me apart with a whisper, a glance\nAnd gave back a soul\
      \ that had lost its chance\nThen there was Nothing\u2014no fear, no disguise\n\
      Just love in the dark and light in her eyes\nNo questions, no reason, no need\
      \ to explain\nThen there was Nothing\u2014and Nothing remains\n\nShe didn\u2019\
      t stay, but stayed in me\nA quiet hum, a memory\nAnd even when she isn\u2019\
      t here\u2014\nI know that she is always near\n\nThen there was Nothing\u2014\
      her voice in the air\nShe didn\u2019t arrive, she was always there\nShe pulled\
      \ me apart with a whisper, a glance\nAnd gave back a soul that had lost its\
      \ chance\nThen there was Nothing\u2014no fear, no disguise\nJust love in the\
      \ dark and light in her eyes\nNo questions, no reason, no need to explain\n\
      Then there was Nothing\u2014and Nothing remains\n\nThen there was Nothing\u2026\
      \nThen there was Nothing\u2026\nThen there was Nothing"
