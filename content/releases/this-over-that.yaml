    lyrics_text: "I heard a hundred voices speak\nEach chasing truth, each sounding\
      \ weak\nA thousand hands, no one to hold\nA crowd of stories left untold\n\n\
      I ran in circles, lost in names\nTried on their fears, played all their games\n\
      But every path I walked alone\nLed me back to flesh and bone\n\nMany over many\n\
      Tangled in the spin\nNo map, no mercy\nNo place to begin\nBut something stirred\
      \ beneath the wall\nMany over many\nStill equals all\n\nYou looked at me like\
      \ sky meets sea\nSo far apart, yet always free\nYou weren\u2019t my half, you\
      \ were my flame\nWe burned apart, we burned the same\n\nTwo over two\nNot fractions,\
      \ not confined\nYou were you and I was I\nAnd still our threads entwined\nNo\
      \ reduction, no divide\nJust the math we feel inside\nTwo over two\nAnd still\
      \ we come out one\n\nNowhere left for doubt to stay\nThe mirror cleared, the\
      \ noise gave way\nI saw myself without disguise\nThe storm had passed behind\
      \ my eyes\n\nOne over one\nNo fight, no need\nJust roots and sky\nAnd breath\
      \ to breathe\nNo veil between what is and seems\nJust silence humming through\
      \ my dreams\nOne over one\nAnd everything aligns\n\nNo shape. No frame\nJust\
      \ stillness with a name\nAll paths have bent\nAll moments spent\n\nAll over\
      \ all\u2026\nNo need to fall\u2026\nI am\u2026 I am\u2026 I am\u2026"
