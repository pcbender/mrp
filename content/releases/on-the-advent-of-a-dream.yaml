    lyrics_text: 'I reached for colors I could never mix

      Notes that faded, slipped between my fingertips

      A canvas stretched, but every stroke was wrong

      A melody unsung, a voice without a song


      Still, the vision burned behind my eyes

      A whispered echo in the night


      On the advent of a dream

      Where the hands don''t match the heart

      Still I soar with weighted wings

      A cathedral made of stars

      Though the notes dissolve like rain

      And the colors run away

      I keep painting, I keep singing

      On the advent of a dream


      I traced the steps of masters long before

      Walked their corridors but never found the door

      They spoke in tones I could not comprehend

      Yet still, I wrote and played, refusing to pretend


      Though the silence mocked the chords I played

      Something in me dared to stay


      What is art, if not the need to make

      What is music, if not the ache

      Even if the world won''t hear

      Even if the canvas stays unclear…


      On the advent of a dream

      Where the hands don''t match the heart

      Still I soar with weighted wings

      A cathedral made of stars

      Even if I''ll never reach

      The vision I have seen

      I keep painting, I keep singing

      On the advent of a dream


      A note unplayed, a line unseen

      Still, I dream… still, I dream'
