    lyrics_text: "I left you a note on the nightstand last night\nJust some lines\
      \ that I scribbled, they didn't come out right\nSomething about missing you,\
      \ something about time\nI don't know, it made sense when it ran through my mind\n\
      \nI thought of a necklace, a ring, or a song\nSomething small you could hold\
      \ while I'm gone\nBut nothing felt perfect, so I let it slide\nFigured you'd\
      \ know how I feel deep inside\n\nA scattershot forget-me-not, I love the way\
      \ that sounds\nA half-written postcard, some words that I lost and found\nI\
      \ don't know why I say these things, but I hope you understand\nThat if I could\
      \ wrap up forever, I'd place it in your hands\n\nTried to tell you this morning,\
      \ but the words came out strange\nSaid, \"I'll call when I can,\" but that's\
      \ not what I meant\nI mean, \"Don't let me fade, don't let us change\"\nBut\
      \ I guess all my meanings get rearranged\n\nA scattershot forget-me-not, yeah,\
      \ maybe that's just me\nA melody tangled in everything I don't say clearly\n\
      I don't know why I ramble on, but I hope you feel it too\nThat if I could leave\
      \ you forever, I'd leave it all with you\n\nMaybe I'm bad at goodbyes, maybe\
      \ I'm worse at holding on\nMaybe my love's just a puzzle with half the pieces\
      \ drawn\nBut you always filled in the rest\u2026 you always know me best\n\n\
      A scattershot forget-me-not, I guess that's what I am\nA handful of moments\
      \ I send in the wind\nA love that I fumble, my song out of tune\nBut if you\
      \ ever feel lonely\u2026 just hum it. Will you"
