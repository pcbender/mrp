    lyrics_text: "Winds scream against the windowpane\nI used to run, I used to break\n\
      But you don't flinch, you don't change\nYou just breathe, you just stay\n\n\
      I lose my way, I lose my fight\nBut you bring me back, you hold me right\n\n\
      My rock, my heart, my Tiger's Eye\nSteady flame when I get lost inside\nUnshaken,\
      \ unchained, you shine\nMy rock, my heart, my Tiger's Eye\n\nYou see the parts\
      \ I try to hide\nYou don't push, you just stand beside\nYou don't tell me how\
      \ to be\nBut somehow, you still set me free\n\nI lose myself, I spin too fast\n\
      But you bring me back, you make it last\n\nMy rock, my heart, my Tiger's Eye\n\
      Steady flame when I get lost inside\nUnshaken, unchained, you shine\nMy rock,\
      \ my heart, my Tiger's Eye\n\nI've been a ghost, I've been a storm\nDrifting,\
      \ wild, undefined\nBut somehow, you always know\nWhere I am, where I'll go\n\
      \nMy rock, my heart, my Tiger's Eye\nHolding on when I come untied\nUnshaken,\
      \ unchained, you shine\nMy rock, my heart, my Tiger's Eye\n\nMy rock, my heart\u2026\
      \ my Tiger's Eye\u2026"
