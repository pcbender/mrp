    title: I think I'm Losing My Place
    slug: i-think-i-m-losing-my-place
    isrc: SE5752602047
    duration: '2:50'
    explicit: false
    preview_audio: /samples/stab--i-think-i-m-losing-my-place.mp3
    links:
      apple_music: https://music.apple.com/us/album/i-think-im-losing-my-place/1873052569?i=1873052573
      spotify: https://open.spotify.com/track/4jyvFeVoi8bOTKbDNDLpiQ
      youtube: https://www.youtube.com/watch?v=dsYv9wAv3RQ
      youtube_music: https://music.youtube.com/watch?v=dsYv9wAv3RQ
    instrumental: false
    lyrics_text: '(mhm)


      I checked my pocket twice in the last three minutes

      But there''s nothing there, just the weight of the air

      I''m sitting at the table, staring at the crumbs

      And I swear I felt a buzz against my thumb

      (did you hear that?)

      It''s like a ghost is tapping on my shoulder

      Trying to tell me something I already know

      I''m waiting for a word from someone I don''t see

      While the actual room is closing in on me


      It''s a hum in the wall, it''s a itch in my head

      It''s the things I haven''t looked at, the things I haven''t said

      I''m reaching for a shadow that isn''t even there

      I think I''m losing my place


      The light from the hallway is a weird shade of blue

      And I''m wondering what everyone is getting up to

      My focus is a mirror that someone just cracked

      Every time I try to settle, I get pulled right back

      (yeah, right back)

      I forgot how to just sit here and breathe

      Without looking for a reason to leave


      (Don''t look)

      (Don''t check)

      But the muscle memory is stronger than the rest

      It''s a reflex, a habit, a recurring test

      And I''m failing it, over and over again


      It''s a hum in the wall, it''s a itch in my head

      It''s the things I haven''t looked at, the things I haven''t said

      I''m reaching for a shadow that isn''t even there

      I think I''m losing my place


      (losing my place)

      (it''s just static)

      (I think I''m losing my place)

      (static)'
    lyrics_source: https://docs.google.com/document/d/1J4uludyUKfDGFVPF7EIZqonKVjMMozrThCvaeDnmvhw/edit
  - number: 2
    title: Not Sure This Is Me
    slug: not-sure-this-is-me
    isrc: SE5752602048
    duration: '3:18'
    explicit: false
    preview_audio: /samples/stab--not-sure-this-is-me.mp3
    links:
      apple_music: https://music.apple.com/us/album/not-sure-this-is-me/1873052569?i=1873052574
      spotify: https://open.spotify.com/track/4wZNCnaJWPdgGQOLDbxdcd
      youtube: https://www.youtube.com/watch?v=j3uVnsnuyPk
      youtube_music: https://music.youtube.com/watch?v=j3uVnsnuyPk
    instrumental: false
    lyrics_text: 'I wake up and the room is bright before the sun

      Not from a window - just the little glowing one

      Headlines, group chats, someone''s photo of their lunch

      And my brain goes, "Yeah, that''s life," like it''s not too much

      I''ve got a million tiny takes I never asked to hold

      I call it being "in the loop," but I''m just being pulled

      Even my quiet has a soundtrack playing low

      Like I''m scared of what I''ll hear if it goes


      It''s weird what starts to feel like home

      Even when it''s wearing you down

      I don''t remember choosing this

      I just remember it being around


      I thought this was just how people are

      Always half here, always reaching

      I thought the buzz was my own heart

      But it''s the room that keeps speaking

      If I''m honest, I don''t know who I am

      When the screen goes dark and it''s only me

      I''m trying to tell the difference now -

      I''m not sure this is me


      I scroll past somebody''s joy like it''s a weather report

      Then check my face in the camera like, "Okay, look normal - go"

      I''ve learned to answer fast, to never miss a beat

      To keep a little smile ready, to stay light on my feet

      But underneath I''m tired in a way I can''t explain

      Like I''ve been running on a treadmill in my own brain

      I say I''m "fine," and I mean it, and it''s true

      But fine is also what you say when you''re numb too


      It''s weird what starts to feel like home

      Even when it''s wearing you down

      I don''t remember choosing this

      I just remember it being around


      I thought this was just how people are

      Always half here, always reaching

      I thought the buzz was my own heart

      But it''s the room that keeps speaking

      If I''m honest, I don''t know who I am

      When the screen goes dark and it''s only me

      I''m trying to tell the difference now -

      I''m not sure this is me


      So what''s mine

      Not the notifications, not the panic check

      Not the need to be seen so I don''t feel left

      What''s mine is smaller than that

      A breath. A chair. A body

      (hold up)

      Maybe I''ve been borrowing myself


      I thought this was just how people are

      Always half here, always reaching

      I thought the buzz was my own heart

      But it''s the room that keeps speaking

      If I''m honest, I don''t know who I am

      When the screen goes dark and it''s only me

      I''m trying to tell the difference now -

      I''m not sure this is me


      Phone face-down

      Hands still twitching

      (mm)

      Like they miss the noise'
