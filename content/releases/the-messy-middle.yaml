    instrumental: false
    lyrics_text: 'I don''t need a big announcement

      I don''t need a new personality

      I just need one small decision

      That belongs to me

      So I put the phone in a drawer

      Not like it''s evil - just like it''s loud

      And I stand there for a second

      Like I''m waiting for permission

      From the crowd


      Nobody clapped

      Nobody noticed

      The world kept spinning like it always does

      And that''s the point, I guess


      I''m stepping back for my own sake

      Not to prove anything, not to be great

      If I disappear for a minute, I''m still real

      I''m just giving my brain a chance to heal

      You can call it boring, you can call it strange

      I''m calling it a line I get to draw

      I''m allowed to log off


      I walk outside without headphones

      And it feels too open at first

      Like the sky is staring at me

      And I forgot how to converse

      But then I hear my footsteps

      And I hear a bird I can''t name

      And it''s not a miracle

      It''s just… unedited

      And somehow that''s enough

      To change


      I keep expecting

      To feel empty

      But I''m starting to feel space

      Between me and the hurry


      I''m stepping back for my own sake

      Not to prove anything, not to be great

      If I disappear for a minute, I''m still real

      I''m just giving my brain a chance to heal

      You can call it boring, you can call it strange

      I''m calling it a line I get to draw

      I''m allowed to log off


      Maybe Emerson was right about the noise

      Not the kind outside -

      The kind that makes you forget your own voice

      And maybe Thoreau wasn''t escaping

      Maybe he was practicing

      How to be a person again

      (yeah)

      One day at a time


      I''m stepping back for my own sake

      Not to prove anything, not to be great

      If I disappear for a minute, I''m still real

      I''m just giving my brain a chance to heal

      You can call it boring, you can call it strange

      I''m calling it a line I get to draw

      I''m allowed to log off


      Drawer closed

      Shoes on

      (mm)

      That''s it'
