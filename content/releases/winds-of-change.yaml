      \ me\nYes, ba-by. You're the only one (the only one)\n\nWalking circles, lost\
      \ in echoes\nRetracing steps we can't unwind\nDo we fight because we're breaking\n\
      Or because we're still entwined\n\nMaybe love was never simple\nMaybe pain was\
      \ built to last\nEvery wound, a fading symbol\nOf a future bound to crash\n\n\
      And then you tell me that you love me\nAnd then you show me that you hate me\n\
      And you'd be better off without me\nYes, ba-by. You're the only one (the only\
      \ one)\n\nStill the only one\u2026\nEven when we fall apart\nStill the only\
      \ one\u2026\nEven when we break our hearts"
