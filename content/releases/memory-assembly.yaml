    lyrics_text: "We said, \"This is one of those days\"\nYou held my hand like you\
      \ knew\nWe weren't just walking through the now\u2014\nWe were five years ahead\
      \ somehow\nLooking back at morning dew\nThe path, the sky, our footsteps too\n\
      \nWe weren\u2019t just here\nWe were then, assembled\nBit by bit, a gentle tremble\n\
      In the shape of what we\u2019d miss\u2026\n\nMemory assembly\u2014\nLayered\
      \ light through falling leaves\nMoments packed like whispered dreams\nWe\u2019\
      ll unwrap them when we need\nMemory assembly\u2014\nWe built the future out\
      \ of now\nWe said we\u2019d hold this somehow\nAnd here we are\nHolding it down\n\
      \nThere\u2019s laughter caught in the corners of dusk\nAnd echoes in old oak\
      \ bark\nThe weight of the words we didn\u2019t rush\u2014\nLike \u201Cthis will\
      \ mean something someday\u201D\nAnd we meant it like a spark\nThrown forward\
      \ into the dark\n\nTime's not a line\u2014it loops and bends\nAnd some moments\
      \ become old friends\nWaiting in reverie\n\nMemory assembly\u2014\nLaid in layers,\
      \ heart and bone\nThreads we gathered on our own\nTo stitch into our unknown\n\
      Memory assembly\u2014\nPromises with open hands\nMoments we could barely stand\n\
      To let go\nBut we did\u2014\nAnd here they land\n\n\"Will we remember this?\"\
      \ you said\n\"We already do,\" I smiled instead\nThe future's built of present\
      \ bliss\nAnd I'll keep building it like this\n\nMemory assembly\u2014\nNot just\
      \ shadows on the wall\nBut the love that holds us all\nWhen we said we'd catch\
      \ the fall\nMemory assembly\u2014\nThe now inside the then\nThe moment we begin\n\
      To remember\nAgain\n\nWe said we\u2019d remember\nAnd we are"
