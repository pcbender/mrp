    lyrics_text: "Hither come softly into the day\nWhere dreams leave fingerprints\
      \ fading away\nBreathe through the ache of the waking trees\nWeave your lost\
      \ longing back through the breeze\n\nHither come softly into the light\nShadow\
      \ runs sharper just out of sight\nName every sorrow that wears your name\nKiss\
      \ every fracture you tried to blame\n\nHither come softly remembering this\n\
      The soul\u2019s first scar is the soul\u2019s first kiss\nDraw toward the cracks\
      \ we miss\u2014\nAnd hither come softly into the bliss\n\nHither come softly\
      \ into the dusk\nCradle the ember inside the husk\nSing to the silence that\
      \ knows your voice\nAnchor your falling \u2014 and make it choice\n\nHither\
      \ come softly into the night\nDance with the sorrow and call it right\nFloat\
      \ through the deep where the broken sleep\nDream yourself whole, and fall into\
      \ sleep\n\nHither come softly remembering this\nThe wound you bear is the door\
      \ you kiss\nDraw toward the grace we miss\u2014\nAnd hither come softly into\
      \ the bliss\n\nWe beckon the life we fear to see\nNot knowing it always beckoned\
      \ me\nCome hither softly, eternally\n\nHither come softly remembering this\n\
      Not all that's lost was meant to exist\nDraw toward the breath we miss\u2014\
      \nAnd hither come softly into the bliss"
