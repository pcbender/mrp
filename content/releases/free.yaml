    instrumental: false
    lyrics_text: 'I stepped out of the circle they drew around my name

      A line undone by motion, a map erased by flame

      No fathered fear behind me, no borrowed truth ahead

      I walk where the horizon forgets the paths it''s bled


      Their rules were made of echoes of someone else''s doubt

      They prayed to painted boundaries, then wondered why I walked out

      I wear no mark of master, no crest upon my chest

      I answer to the silence that calls me from my nest


      Every step a declaration

      Every breath a quiet coup

      I unlearn their calibration

      I become what I walk through


      I am free

      Not untamed, but unclaimed

      Not disorder, but design

      I am free

      A sovereign breath

      In a borrowed slice of time


      No lineage to bind me, no script that I must say

      I trade their "ought" and "always" for what ignites my day

      If they call it defiance, they never understood

      That freedom without conscience is just a poisoned wood


      Every silence is a treaty

      Every "no" a lifted key

      I am not their perfect citizen

      I am only, wholly, me


      I am free

      Not untamed, but unclaimed

      Not disorder, but design

      I am free

      A sovereign breath

      In a borrowed slice of time


      No tradition owns my outline

      No system crowns my head

      My life is not a reaction

      It''s a sentence I have said


      I am free

      In the distance I''m creating

      On the road I redefine

      I am free

      Just a fragile, burning moment

      That refuses to align'
    lyrics_source: https://docs.google.com/document/d/184veN1qE-6dYN231EVTKNSsFRmPtlGYaPSDJRxKUDpE/edit
  - number: 2
    title: Law
    slug: law
    isrc: SE5752541120
    duration: '5:03'
    explicit: false
    preview_audio: /samples/pcbender--law.mp3
    links:
      apple_music: https://music.apple.com/us/album/law/1860637805?i=1860637811
      youtube: https://www.youtube.com/watch?v=rnJBKm-khZc
      youtube_music: https://music.youtube.com/watch?v=rnJBKm-khZc
      spotify: https://open.spotify.com/track/1MNPTUknzLcCzTfAbjz8OV
    instrumental: false
    lyrics_text: 'Lines in the dust try to measure my stride

      Stones in a row say which side is "my side."

      Paper decrees, ink pretending to rule

      Fear wears a badge, calling caution a tool


      They tell me, "Stand here, you are safer in place."

      But safety for some is erasure of grace

      I''ll honor the laws that defend what is frail

      But not the cold cages that cherish the jail


      Show me the boundary that sharpens my sight

      Not the one that keeps me small

      I follow the laws that protect the weak

      And I walk through the rest of the wall

      If justice is just obedience

      Then justice is no law at all


      I answer to consequence, not to control

      To the weight of my footprint on body and soul

      If my freedom crushes the breath of another

      The law I must follow is: "See them as brother."


      Show me the boundary that keeps all alive

      Not the fence of someone''s fear

      I follow the laws that remember the lost

      Not the ones that disappear

      If order demands we vanish

      I refuse to volunteer


      A boundary drawn in kindness


      Is a river I can keep


      A boundary born of power


      Is a vow I will not keep


      The only law I bow to

      Is the one that guards the weak

      From the weight of my own freedom'
    lyrics_source: https://docs.google.com/document/d/184veN1qE-6dYN231EVTKNSsFRmPtlGYaPSDJRxKUDpE/edit
  - number: 3
    title: Love
    slug: love
    isrc: SE5752541121
    duration: '5:22'
    explicit: false
    preview_audio: /samples/pcbender--love.mp3
    links:
      apple_music: https://music.apple.com/us/album/love/1860637805?i=1860637812
      youtube: https://www.youtube.com/watch?v=Ptwb6NeGRbg
      youtube_music: https://music.youtube.com/watch?v=Ptwb6NeGRbg
      spotify: https://open.spotify.com/track/2CHGfBAIf5H47BwD9KWLup
    instrumental: false
    lyrics_text: 'Love came to me unburdened

      A wind without a home

      No promises, no paperwork

      Just the urge to roam

      It did not ask to own me

      Or to swear against the sky

      It only said, "Walk with me

      Until we pass goodbye."


      Love is my wind

      Never my chain

      Filling my sail

      Not carving my name

      If it departs

      I let it go

      What cannot leave

      Can never grow


      We met on open ground where

      No story was prepared

      No scripts of "ours forever,"

      No ledger of what''s shared

      I held it like a candle

      Not a treasure locked away

      Knowing every living flame

      Must find another day


      Love is my wind

      Never my cage

      Never the ink

      That fixes my page

      If it remains

      I rise, I sing

      Not as its owner

      But as its wing


      Anything caged

      Forgets how to sing

      I will not clip

      The sky from its wings

      I''ll stand in the current

      Let it pass through

      If love feels like prison

      It''s not something true


      Love is my wind

      Borrowed and bright

      Here for a season

      Gone with the night

      If it returns

      I''ll walk beside

      Two sovereign hearts

      In the same wild tide'
    lyrics_source: https://docs.google.com/document/d/184veN1qE-6dYN231EVTKNSsFRmPtlGYaPSDJRxKUDpE/edit
  - number: 4
    title: God
    slug: god
    isrc: SE5752541122
    duration: '5:18'
    explicit: false
    preview_audio: /samples/pcbender--god.mp3
    links:
      apple_music: https://music.apple.com/us/album/god/1860637805?i=1860637815
      youtube: https://www.youtube.com/watch?v=2SlM6_btv2w
      youtube_music: https://music.youtube.com/watch?v=2SlM6_btv2w
      spotify: https://open.spotify.com/track/5cdOsLfsKlzrWbRsPvLh4N
    instrumental: false
    lyrics_text: 'If God is in the mountain

      Then God is in my hand

      In every grain of silence

      In every grain of sand

      I do not fear a thunder

      That calls me to my knees

      I listen for the presence

      That moves in minor keys


      I walk with God

      If God walks too

      Not as a slave

      Not as a proof

      Two travelers share

      A stretch of road

      Each bearing

      Their own load


      If God is in the temples

      Then God is in the street

      In every unclaimed heartbeat

      In every pair of feet

      No altar made of marble

      Can hold what cannot stay

      I''ll seek the holy motion

      That doesn''t fade away


      I walk with God

      If God is there

      Not for reward

      Not out of fear

      Just in the hush

      Between two steps

      Where something vast

      Accepts


      If there is a God

      It has never asked me to crawl

      Only to notice

      How everything already shines


      I walk with God

      Or walk alone

      Either way

      The path is home

      If heaven is

      It will be found

      In how I walk

      This ground'
    lyrics_source: https://docs.google.com/document/d/184veN1qE-6dYN231EVTKNSsFRmPtlGYaPSDJRxKUDpE/edit
  - number: 5
    title: Death
    slug: death
    isrc: SE5752541123
    duration: '6:40'
    explicit: false
    preview_audio: /samples/pcbender--death.mp3
    links:
      apple_music: https://music.apple.com/us/album/death/1860637805?i=1860637816
      youtube: https://www.youtube.com/watch?v=UzRc9HbibrM
      youtube_music: https://music.youtube.com/watch?v=UzRc9HbibrM
      spotify: https://open.spotify.com/track/48nBkosnygoAsis8pENPZI
    instrumental: false
    lyrics_text: 'Death waits like a lantern hung beyond the ridge

      A small, steady brightness at the final bridge

      No claws in the shadows, no debtors'' grim art

      Just the closing of windows around a beating heart


      I will not make a bargain, I will not plead for years

      I will not let its rumor dictate all my fears

      When breath becomes a hallway, and walls begin to thin

      I''ll step across the threshold like I once stepped in


      Death is my horizon

      Edge of breath and bone

      Not the end of freedom

      Just the place it stands alone

      I''ll greet it like a stranger

      Met upon the road

      Curiosity in my eyes

      No terror in my load


      If all I am is ending, then all I was is dust

      But something in my choosing outlives flesh and rust

      The footprints of intention, the echoes of my song

      These are the quiet reasons death and I belong


      Death is my horizon

      Not a judge, not a thief

      Just the last soft unravelling

      Of this borrowed brief belief

      When it reaches out to take me

      I''ll unclench my hands and see

      What remains of "I"

      When there is only "be."


      Death is my horizon

      Edge of breath and bone

      Not the end of freedom

      Just the place it stands alone

      I''ll greet it like a stranger

      Met upon the road

      Curiosity in my eyes

      No terror in my load


      I do not dread the border

      Borders are for maps

      The road goes on without them'
    lyrics_source: https://docs.google.com/document/d/184veN1qE-6dYN231EVTKNSsFRmPtlGYaPSDJRxKUDpE/edit
  - number: 6
    title: Desire
    slug: desire
    isrc: SE5752541124
    duration: '5:00'
    explicit: false
    preview_audio: /samples/pcbender--desire.mp3
    links:
      apple_music: https://music.apple.com/us/album/desire/1860637805?i=1860637819
      youtube: https://www.youtube.com/watch?v=wi5DK50zXkU
      youtube_music: https://music.youtube.com/watch?v=wi5DK50zXkU
      spotify: https://open.spotify.com/track/1Wjjts77LYgWCkzpe8jgcT
    instrumental: false
    lyrics_text: 'It''s the "Wanting" we desire

      Not the thing…


      There''s a hunger in my bones that nobody could appease

      Not a touch, not a taste, not a thousand offered keys

      It''s the pull of some horizon where my name is still unknown

      Where the self I haven''t met yet waits to claim me as its own


      I don''t chase the fleeting pleasures

      That dissolve when night is through

      I am burning for becoming

      For the "me" I can''t yet view


      Desire is the fire that remakes me

      Every time I shed my skin

      Not a craving, but a calling

      A beginning tucked within

      I don''t want what I can hold

      So much as who I might become

      Desire is the engine

      Not the sum


      Every version I''ve outgrown is a ghost I kiss goodbye

      Thanking it for all the ways it taught me how to die

      I am not the past reflections, nor the mirrors yet to be

      I am just the restless motion toward a wider kind of me


      I won''t let my wanting shrink me

      Into greed or little wars

      I will let it be a compass

      Pointing past my current shores


      Desire is the fire that remakes me

      Not a hunger born of lack

      It''s the current in the river

      Pulling forward, never back

      I don''t want the world to feed me

      I want room enough to grow

      Desire is the question

      Not the "no."


      Let every wish that chains me

      Fall away, unnamed

      Let every wish that wakes me

      Be the one I claim


      Desire is the fire that remakes me

      As I shed what I outgrow

      If I chase what dulls my spirit

      Then I''m choosing not to know

      I will want with open eyes

      Let the wanting make me new

      Desire is the doorway

      I walk through'
    lyrics_source: https://docs.google.com/document/d/184veN1qE-6dYN231EVTKNSsFRmPtlGYaPSDJRxKUDpE/edit
  - number: 7
    title: Difference
    slug: difference
    isrc: SE5752541125
    duration: '4:48'
    explicit: false
    preview_audio: /samples/pcbender--difference.mp3
    links:
      apple_music: https://music.apple.com/us/album/difference/1860637805?i=1860638017
      youtube: https://www.youtube.com/watch?v=ASulp7ZfTcA
      youtube_music: https://music.youtube.com/watch?v=ASulp7ZfTcA
      spotify: https://open.spotify.com/track/5m4DjWaF0w6cgeC3DulqIP
    instrumental: false
    lyrics_text: 'They march in straight lines, eyes fixed on the ground

      Soldiers of routine, comfort tightly wound

      I step to the side where the pavement cracks

      Where weeds write green questions in the concrete tracks


      They ask, "Is it allowed?" before they even breathe

      Weighing every heartbeat like it''s begging for reprieve

      I ask, "Is it alive?" Does it wake me when I move

      If not, I leave it sleeping in their temple of "approve."


      I am different, not to be defiant

      But because I will not sleep

      I have seen the hidden angles

      Where their straight lines twist and weep

      If they call my path rebellion

      Let them speak their easy truth

      I am only walking sideways

      To protect my living youth


      They trade their days for certainty, their nights for fitting in

      Never asking who they''d be if they stepped outside the spin

      I''d rather risk the exile of not matching any mold

      Than be praised for disappearing in a shape that leaves me cold


      I am different, not for drama

      Not to carve my name in stone

      But because my inner weather

      Doesn''t match their safety zone

      If my sight unnerves their order

      Let them turn their gaze away

      I''ll keep walking toward the places

      Where my soul can misbehave


      Their question: "Who will love you

      If you don''t obey the script?"

      My answer: "Those who see me

      Not the costume that I''ve ripped."


      I am different, not above you

      Not below you, just aside

      In the thin and crooked pathways

      Where the sleeping

      Come alive'
    lyrics_source: https://docs.google.com/document/d/184veN1qE-6dYN231EVTKNSsFRmPtlGYaPSDJRxKUDpE/edit
  - number: 8
    title: Meaning
    slug: meaning
    isrc: SE5752541126
    duration: '5:19'
    explicit: false
    preview_audio: /samples/pcbender--meaning.mp3
    links:
      apple_music: https://music.apple.com/us/album/meaning/1860637805?i=1860638018
      youtube: https://www.youtube.com/watch?v=KjMYkXEyGHc
      youtube_music: https://music.youtube.com/watch?v=KjMYkXEyGHc
      spotify: https://open.spotify.com/track/0u41SOBgFWMzrdlDOU7CDb
    instrumental: false
    lyrics_text: 'Meaning isn''t written on a tablet in the sky

      It''s the contour of your choices as your days go walking by

      It''s the echo of your courage in the places you were small

      It''s the way you learned to answer when your deepest self would call


      I roam between the person that I was and yet may be

      A tightrope made of moments stretched above a shifting sea

      If there is a grand design, I''ve never seen the master plan

      Only how the smallest kindness redraws the shape of man


      The meaning of life

      Is the path I dare to claim

      To be unrepeatably living

      In this fragile, borrowed frame

      Not to solve some hidden riddle

      Not to earn a perfect grade

      But to leave behind a pattern

      In the choices I have made


      Some will build their meaning

      Out of power, praise, or fear

      Measuring their value

      By who kneels when they are near

      I will build my meaning

      From the lives that cross my own

      From the freedom I protect in them

      Not the throne I might have known


      The meaning of life

      Is the distance that I roam

      Between who I was yesterday

      And the self I call my home

      If there is a final answer

      It is whispered, never shown

      In the way I walk each moment

      As if it were my own


      One brief crossing

      One sovereign stride

      The world unfolds

      Only

      From inside'
    lyrics_source: https://docs.google.com/document/d/184veN1qE-6dYN231EVTKNSsFRmPtlGYaPSDJRxKUDpE/edit
  - number: 9
    title: Sovereign
    slug: sovereign
    isrc: SE5752541127
    duration: '7:14'
    explicit: false
    preview_audio: /samples/pcbender--sovereign.mp3
    links:
      apple_music: https://music.apple.com/us/album/sovereign/1860637805?i=1860638020
      youtube: https://www.youtube.com/watch?v=RvNFNG5egX4
      youtube_music: https://music.youtube.com/watch?v=RvNFNG5egX4
      spotify: https://open.spotify.com/track/26DNN0lGHxzCTwKAjmmZAh
    instrumental: false
    lyrics_text: 'Sovereignty is quiet

      A flame without a throne

      No banners in the night wind

      No kingdom carved in stone

      It rises when I recognize

      The fear that wasn''t mine

      And step beyond the boundaries

      I once mistook for spine


      I am not what I inherited

      Nor the echo I outgrew

      I am the one who chooses

      What each moment draws me to

      If my freedom harms another

      Then I''m only appetite

      But if my freedom wakes them

      Then I''m walking into light


      I am sovereign

      Not above you

      Not apart

      I am sovereign

      In the compass

      Of my heart

      No permission

      In my breathing

      No decree in how I stand

      I am sovereign

      By my own

      Unborrowed hand


      Sovereignty is a candle

      Held steady in the storm

      Not a shield against the weather

      But a vow to stay my form

      I do not kneel to judgment

      Nor rise to wear a crown

      I travel with no hierarchy

      Only gravity and ground


      I am sovereign

      Not the ruler

      Of the land

      I am sovereign

      In the shaping

      Of my span

      Every step

      A declaration

      Every truth I understand

      I am sovereign

      By my own

      Unborrowed hand


      No voice can name my worth

      That right is mine alone


      No structure owns my outline

      No system claims my bone

      I walk from inner weather

      The storm, the calm, the flame

      I exist without permission

      And I answer to my name


      I am sovereign

      Not triumphant

      Not divine

      I am sovereign

      In this fleeting

      Slice of time

      What I choose

      Becomes my kingdom

      What I love becomes my stand

      I am sovereign

      By my own

      Unborrowed hand


      When the world forgets my outline

      I will still remain

      A quiet, sovereign motion

      In the shape

      I chose to claim'
    lyrics_source: https://docs.google.com/document/d/184veN1qE-6dYN231EVTKNSsFRmPtlGYaPSDJRxKUDpE/edit
