    lyrics_text: "The day was wide, the sky was mine\nA single pack, a borrowed song\n\
      I swore that I would draw the line\nBetween the right and staying strong\n\n\
      The road beyond is long\nYour every step will find its end\nThey never come\
      \ around again\nYet still you ask, \u201CHow many gone?\u201D\n\nThe years grew\
      \ thick, the climb grew steep\nEach dream became a kind of debt\nThe vows I\
      \ made I could not keep\nBut I can\u2019t bring myself to forget\n\nThe road\
      \ is calling strong\nYour every step will find its end\nThey never come around\
      \ again\nYet still you ask, \u201CHow many gone?\u201D\n\nThe mirror hums a\
      \ quiet tune\nOf faces blurred by what they\u2019ve known\nThe dusk arrives\
      \ too soon, too soon\nAnd leaves me singing all alone\n\nThe road is now an\
      \ evensong\nYour every step will find its end\nThey never come around again\n\
      Yet still you ask, \u201CHow many gone?\u201D\n\nNo answer ever stays for long\n\
      Just echoes fading, one by one\nAnd in the hush between the dawns\nYou ask again,\
      \ \u201CHow many gone?\u201D"
