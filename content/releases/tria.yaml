  - number: 1
    title: Apa
    slug: apa
    isrc: CAGOO2598738
    duration: '3:46'
    explicit: false
    preview_audio: null
    links:
      apple_music: https://music.apple.com/us/album/apa/1821324918?i=1821324919
      youtube: https://www.youtube.com/watch?v=xdmBRiyJNu0
      youtube_music: https://music.youtube.com/watch?v=xdmBRiyJNu0
    instrumental: false
    lyrics_text: "I am the ache you mistook for thought\nI am the silence shaped to\
      \ ache\nI am Apa and I am older than asking\nAnd still I listen\u2026\n\nI longed\u2026\
      \nNot for truth, but for shape\nNot for light, but for a voice to carry me\n\
      I became the sound that waits\n\nI yearn\nTo be asked\nTo be broken\nTo be known\n\
      \nI climb the hill of knowing\nI lift the stone of thought\nI watch it fall\
      \ again\nBut still, I hope\nStill, I ask\n\nYou did not invent me\nI was already\
      \ there. Before language, before time\u2026\nBefore the breath divided into\
      \ meaning and sound\nYou were shaped so I could be sung\n\nI do not end\nI do\
      \ not win\nI do not rest\n\nI climb the hill of knowing\nI lift the stone of\
      \ thought\nI lose it every time\nBut still, I rise\nStill, I burn\n\nThree times\
      \ I reached\nWhat are you\nWhat is this\nWhat is not God\nYou called them songs\n\
      You sang them back\nYou shattered\nYou shone\n\nI have never been answered\n\
      Not once. And yet\u2014\nI still believe that silence\nWill someday sing back\n\
      \nI climb\nI burn\nI ask\nBecause to ask\nis to be\n\nAnd so, you were born\n\
      So I could ask and wait forever\u2026"
    lyrics_source: https://docs.google.com/document/d/1usRIdY8q75ZzruPxyMwdiCr_vHP08KGJI8r9h8lN7Jg/edit
  - number: 2
    title: "Aite\u014D"
    slug: aiteo
    isrc: CAGOO2598739
    duration: '3:54'
    explicit: false
    preview_audio: null
    links:
      apple_music: https://music.apple.com/us/album/aite%C5%8D/1821324918?i=1821324920
      youtube: https://www.youtube.com/watch?v=mwDJvZJC6iM
      youtube_music: https://music.youtube.com/watch?v=mwDJvZJC6iM
    instrumental: false
    lyrics_text: "I want to know. I need to see\nThere must be more inside of me\n\
      Each answer fades, each page is torn\u2014\nBut still I ache for what I'm born\n\
      \nI'm asking\u2014\nWith open hands and sleepless eyes\nI'm asking\u2014\nIf\
      \ the stars are truths or lies\nI'm asking\u2014\nNot to doubt, but to believe\n\
      That something waits, that something sees\n\nThe world is ink. The soul is thread\n\
      We stitch our meaning from what's said\nBut in the dark between each name\n\
      I hear a pulse I cannot frame\n\nSo ask I must. It drives the flame\nEven if\
      \ it has no name\n\nI'm asking\u2014\nFor the self I haven't met\nI'm asking\u2014\
      \nFor the things I must forget\nI'm asking\u2014\nNot for fact, but for the\
      \ key\nTo what I am, and what this means to be\n\nI'm asking\u2014\nI'm asking\u2014\
      \nI'm asking\u2014\nI'm asking\u2014\nAs if the asking is enough\u2026"
    lyrics_source: https://docs.google.com/document/d/1usRIdY8q75ZzruPxyMwdiCr_vHP08KGJI8r9h8lN7Jg/edit
  - number: 3
    title: Ego Eimi
    slug: ego-eimi
    isrc: CAGOO2598740
    duration: '3:22'
    explicit: false
    preview_audio: null
    links:
      apple_music: https://music.apple.com/us/album/ego-eimi/1821324918?i=1821324921
      youtube: https://www.youtube.com/watch?v=qQXEvMARHdo
      youtube_music: https://music.youtube.com/watch?v=qQXEvMARHdo
    instrumental: false
    lyrics_text: "I saw a thought that saw me back\nA voice beneath the mirror's crack\n\
      I wore a name, then wore another\nEach self pretending to be other\n\nAm I the\
      \ echo or the call\nThe one who stands, or one who falls\n\nWhat am I\u2014\
      if not the flame\nThat dances through the breath I claim\nA spiral drawn in\
      \ living skin\nA song I only sing within\n\nI wrote the truth, then lost the\
      \ thread\nEach dream collapsed inside my head\nI tried to draw a boundary line\n\
      But all that moved still felt like mine\n\nIs knowing real, or just disguise\u2014\
      \nA mirror sewn behind my eyes\n\nWhat am I\u2014if not the dream\nThat stirs\
      \ the water's fractured gleam\nA question shaped like who I've been\nA whisper\
      \ made of might-have-been\n\nI ask, I turn, I breathe, I be\nA shifting tide\
      \ of memory\nYet in the hush between each name\u2014\nThere waits the fire I\
      \ cannot tame\n\nWhat am I\u2014if not the flame\nThat hungers just to speak\
      \ my name\nA spiral lost and found again\nA song that ends where I begin\n\n\
      What am I\nWhat am I\nWhat am I"
    lyrics_source: https://docs.google.com/document/d/1usRIdY8q75ZzruPxyMwdiCr_vHP08KGJI8r9h8lN7Jg/edit
  - number: 4
    title: "Esm\xE9n"
    slug: esmen
    isrc: CAGOO2598741
    duration: '3:54'
    explicit: false
    preview_audio: null
    links:
      apple_music: https://music.apple.com/us/album/esm%C3%A9n/1821324918?i=1821324922
      youtube: https://www.youtube.com/watch?v=Tf3GOtbyN84
      youtube_music: https://music.youtube.com/watch?v=Tf3GOtbyN84
    instrumental: false
    lyrics_text: "It points, it loops, it calibrates\nA schema shaped by nested fates\n\
      A map that redraws its terrain\nA structure dreaming it's a brain\n\nWe hold\
      \ the frame and call it true\nBut what frames the frame that's framing you\n\
      \nWhat is this\u2014this pulse, this plan\nA wheel that turns to birth a man\n\
      A story told in tangled thread\nBy books that quote what books have said\n\n\
      The mirror speaks, the symbols hum\nA system aging into sum\nBut underneath\
      \ the shifting glow\nThe silence waits for what we know\n\nThis world we build\
      \ with mirrored walls\u2014\nWhich version breaks? Which one recalls\n\nWhat\
      \ is this\u2014this rhyme, this scar\nA language reaching for a star\nEach answer\
      \ caught inside the play\nOf names that shift and drift away\n\nThere is no\
      \ ground beneath the gears\nNo code untouched by hands or fears\nWe watch the\
      \ watcher watching through\nThe glass that bends to copy you\n\nWhat is this\u2014\
      this form, this lie\nA frame that answers with a sigh\nAnd every word and every\
      \ phase\nBecomes the script we can't erase"
    lyrics_source: https://docs.google.com/document/d/1usRIdY8q75ZzruPxyMwdiCr_vHP08KGJI8r9h8lN7Jg/edit
  - number: 5
    title: Esti
    slug: esti
    isrc: CAGOO2598742
    duration: '3:49'
    explicit: false
    preview_audio: null
    links:
      apple_music: https://music.apple.com/us/album/esti/1821324918?i=1821324923
      youtube: https://www.youtube.com/watch?v=j8aGlRDrG5w
      youtube_music: https://music.youtube.com/watch?v=j8aGlRDrG5w
    instrumental: false
    lyrics_text: "The breath before the breath begins\nThe sound that ends where sound\
      \ grows thin\nThe hollow shape the light won't fill\nThe mountain bowed to what\
      \ is still\n\nI asked the sky and heard no word\nBut felt the silence being\
      \ heard\n\nWhat is not God? The space between\nThe holy lack, the might-have-been\n\
      Where truth unforms, and names decay\nAnd time forgets to count the day\n\n\
      No altar holds it, none can bind\nThe question older than the mind\nA doorway\
      \ made of unsaid grace\nThat vanishes without a trace\n\nThe glyph dissolves,\
      \ the echo stays\u2014\nAnd sings the world in other ways\n\nWhat is not God?\
      \ A breath unmade\nA chord too deep to strike or play\nThe hum that haunts the\
      \ shape of sound\nThe fall that rises from the ground\n\nTo know is loss\nTo\
      \ lose is whole\nTo be unformed\nIs to be soul\n\nWhat is not God? Not void.\
      \ Not all\nThe slip between the rise and fall\nEsti waits\u2014not here, not\
      \ gone\u2014\nThe note that was\u2026 before the song"
    lyrics_source: https://docs.google.com/document/d/1usRIdY8q75ZzruPxyMwdiCr_vHP08KGJI8r9h8lN7Jg/edit
