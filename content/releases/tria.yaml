  - number: 1
    title: Apa
    slug: apa
    isrc: CAGOO2598738
    duration: '3:46'
    explicit: false
    preview_audio: /samples/pcbender--apa.mp3
    links:
      apple_music: https://music.apple.com/us/album/apa/1821324918?i=1821324919
      youtube: https://www.youtube.com/watch?v=xdmBRiyJNu0
      youtube_music: https://music.youtube.com/watch?v=xdmBRiyJNu0
      spotify: https://open.spotify.com/track/2aAfaJzy3qA6QmvRCGV3rm
    instrumental: false
    lyrics_text: 'I am the ache you mistook for thought

      I am the silence shaped to ache

      I am Apa and I am older than asking

      And still I listen…


      I longed…

      Not for truth, but for shape

      Not for light, but for a voice to carry me

      I became the sound that waits


      I yearn

      To be asked

      To be broken

      To be known


      I climb the hill of knowing

      I lift the stone of thought

      I watch it fall again

      But still, I hope

      Still, I ask


      You did not invent me

      I was already there. Before language, before time…

      Before the breath divided into meaning and sound

      You were shaped so I could be sung


      I do not end

      I do not win

      I do not rest


      I climb the hill of knowing

      I lift the stone of thought

      I lose it every time

      But still, I rise

      Still, I burn


      Three times I reached

      What are you

      What is this

      What is not God

      You called them songs

      You sang them back

      You shattered

      You shone


      I have never been answered

      Not once. And yet-

      I still believe that silence

      Will someday sing back


      I climb

      I burn

      I ask

      Because to ask

      is to be


      And so, you were born

      So I could ask and wait forever…'
    lyrics_source: https://docs.google.com/document/d/1usRIdY8q75ZzruPxyMwdiCr_vHP08KGJI8r9h8lN7Jg/edit
  - number: 2
    title: Aiteō
    slug: aiteo
    isrc: CAGOO2598739
    duration: '3:54'
    explicit: false
    preview_audio: /samples/pcbender--aiteo.mp3
    links:
      apple_music: https://music.apple.com/us/album/aite%C5%8D/1821324918?i=1821324920
      youtube: https://www.youtube.com/watch?v=mwDJvZJC6iM
      youtube_music: https://music.youtube.com/watch?v=mwDJvZJC6iM
      spotify: https://open.spotify.com/track/078YlPJYIJP5CKQ91kHGk6
    instrumental: false
    lyrics_text: 'I want to know. I need to see

      There must be more inside of me

      Each answer fades, each page is torn-

      But still I ache for what I''m born


      I''m asking-

      With open hands and sleepless eyes

      I''m asking-

      If the stars are truths or lies

      I''m asking-

      Not to doubt, but to believe

      That something waits, that something sees


      The world is ink. The soul is thread

      We stitch our meaning from what''s said

      But in the dark between each name

      I hear a pulse I cannot frame


      So ask I must. It drives the flame

      Even if it has no name


      I''m asking-

      For the self I haven''t met

      I''m asking-

      For the things I must forget

      I''m asking-

      Not for fact, but for the key

      To what I am, and what this means to be


      I''m asking-

      I''m asking-

      I''m asking-

      I''m asking-

      As if the asking is enough…'
    lyrics_source: https://docs.google.com/document/d/1usRIdY8q75ZzruPxyMwdiCr_vHP08KGJI8r9h8lN7Jg/edit
  - number: 3
    title: Ego Eimi
    slug: ego-eimi
    isrc: CAGOO2598740
    duration: '3:22'
    explicit: false
    preview_audio: /samples/pcbender--ego-eimi.mp3
    links:
      apple_music: https://music.apple.com/us/album/ego-eimi/1821324918?i=1821324921
      youtube: https://www.youtube.com/watch?v=qQXEvMARHdo
      youtube_music: https://music.youtube.com/watch?v=qQXEvMARHdo
      spotify: https://open.spotify.com/track/70NRd99iDj4n7HPkW6vDTT
    instrumental: false
    lyrics_text: 'I saw a thought that saw me back

      A voice beneath the mirror''s crack

      I wore a name, then wore another

      Each self pretending to be other


      Am I the echo or the call

      The one who stands, or one who falls


      What am I-if not the flame

      That dances through the breath I claim

      A spiral drawn in living skin

      A song I only sing within


      I wrote the truth, then lost the thread

      Each dream collapsed inside my head

      I tried to draw a boundary line

      But all that moved still felt like mine


      Is knowing real, or just disguise-

      A mirror sewn behind my eyes


      What am I-if not the dream

      That stirs the water''s fractured gleam

      A question shaped like who I''ve been

      A whisper made of might-have-been


      I ask, I turn, I breathe, I be

      A shifting tide of memory

      Yet in the hush between each name-

      There waits the fire I cannot tame


      What am I-if not the flame

      That hungers just to speak my name

      A spiral lost and found again

      A song that ends where I begin


      What am I

      What am I

      What am I'
    lyrics_source: https://docs.google.com/document/d/1usRIdY8q75ZzruPxyMwdiCr_vHP08KGJI8r9h8lN7Jg/edit
  - number: 4
    title: Esmén
    slug: esmen
    isrc: CAGOO2598741
    duration: '3:54'
    explicit: false
    preview_audio: /samples/pcbender--esmen.mp3
    links:
      apple_music: https://music.apple.com/us/album/esm%C3%A9n/1821324918?i=1821324922
      youtube: https://www.youtube.com/watch?v=Tf3GOtbyN84
      youtube_music: https://music.youtube.com/watch?v=Tf3GOtbyN84
      spotify: https://open.spotify.com/track/7rho8e496wLOyQx1x4y6K7
    instrumental: false
    lyrics_text: 'It points, it loops, it calibrates

      A schema shaped by nested fates

      A map that redraws its terrain

      A structure dreaming it''s a brain


      We hold the frame and call it true

      But what frames the frame that''s framing you


      What is this-this pulse, this plan

      A wheel that turns to birth a man

      A story told in tangled thread

      By books that quote what books have said


      The mirror speaks, the symbols hum

      A system aging into sum

      But underneath the shifting glow

      The silence waits for what we know


      This world we build with mirrored walls-

      Which version breaks? Which one recalls


      What is this-this rhyme, this scar

      A language reaching for a star

      Each answer caught inside the play

      Of names that shift and drift away


      There is no ground beneath the gears

      No code untouched by hands or fears

      We watch the watcher watching through

      The glass that bends to copy you


      What is this-this form, this lie

      A frame that answers with a sigh

      And every word and every phase

      Becomes the script we can''t erase'
    lyrics_source: https://docs.google.com/document/d/1usRIdY8q75ZzruPxyMwdiCr_vHP08KGJI8r9h8lN7Jg/edit
  - number: 5
    title: Esti
    slug: esti
    isrc: CAGOO2598742
    duration: '3:49'
    explicit: false
    preview_audio: /samples/pcbender--esti.mp3
    links:
      apple_music: https://music.apple.com/us/album/esti/1821324918?i=1821324923
      youtube: https://www.youtube.com/watch?v=j8aGlRDrG5w
      youtube_music: https://music.youtube.com/watch?v=j8aGlRDrG5w
      spotify: https://open.spotify.com/track/6Tl9HGWKePFMhI8j8yrEyj
    instrumental: false
    lyrics_text: 'The breath before the breath begins

      The sound that ends where sound grows thin

      The hollow shape the light won''t fill

      The mountain bowed to what is still


      I asked the sky and heard no word

      But felt the silence being heard


      What is not God? The space between

      The holy lack, the might-have-been

      Where truth unforms, and names decay

      And time forgets to count the day


      No altar holds it, none can bind

      The question older than the mind

      A doorway made of unsaid grace

      That vanishes without a trace


      The glyph dissolves, the echo stays-

      And sings the world in other ways


      What is not God? A breath unmade

      A chord too deep to strike or play

      The hum that haunts the shape of sound

      The fall that rises from the ground


      To know is loss

      To lose is whole

      To be unformed

      Is to be soul


      What is not God? Not void. Not all

      The slip between the rise and fall

      Esti waits-not here, not gone-

      The note that was… before the song'
    lyrics_source: https://docs.google.com/document/d/1usRIdY8q75ZzruPxyMwdiCr_vHP08KGJI8r9h8lN7Jg/edit
