    lyrics_text: "The Hupa knew for centuries\nMad River feeds on memories\nShe steals\
      \ the things we leave behind\nThe fragments of a shattered mind\n\nShe murmurs\
      \ names in canyon walls\nReplays regrets as water falls\nA cradle once, now\
      \ grave and guide\nShe keeps the secrets I can\u2019t hide\n\nAnd flow she must\
      \ into the sea\nAs all things do, eventually\n\nThey marked my brow with smoke\
      \ and fire\nA boy unmade for new desire\nThrough gravel\u2019s teeth and willow\u2019\
      s breath\nI met the mouth that promised death\n\nShe coiled \u2018round my shaking\
      \ knees\nAnd whispered truths like rustling leaves\nShe said you\u2019ll break,\
      \ but still be free\nAnd vanished in the redwood trees\n\nAnd flow she must\
      \ into the sea\nAs all things do, eventually\n\nThe years are clouds that never\
      \ lift\nMy mind, a boat that\u2019s come adrift\nI call her name, but find no\
      \ sound\nJust water pulling me down\n\nShe visits now in flash and dream\nSoft\
      \ laughter tangled in the stream\nShe took my thoughts and gave me peace\nBut\
      \ left me longing for release\n\nAnd flow she must into the sea\nAs all things\
      \ do, eventually\n\nAnd flow she must into the sea\nAs all things do, eventually"
