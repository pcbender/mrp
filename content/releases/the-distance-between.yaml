    lyrics_text: 'Fingers drum on the glass divide

      Truth don''t knock-it slips inside

      Mirror, mirror empty square

      Been that, done there, I don''t care


      So close we hum in parallel time

      Our rhythms sync but miss the rhyme


      You mean what I say, I say what you mean

      Each preaching insight but not what''s been

      Your beautiful noise, a critical scene

      What stands in our way is the distance between


      Whispers hum in static tone

      Echoes make the dark my own

      Every scar''s a map I fake

      Tracing dreams I never wake


