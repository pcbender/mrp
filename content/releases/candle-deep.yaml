    lyrics_text: "A candle deep\n\nSome walk with fire hidden low\nA glow within,\
      \ a pulse they know\nIt's not for show, it doesn't blind\nBut lights the edges\
      \ of the mind\nOthers pass with empty gaze\nLost in noise and shadowed days\n\
      \nThey've never burned, so never yearn\nFor embers they can't discern\n\nA candle\
      \ deep\nLight in eyes\nWhat you seek\nThey tantalize\nIf never had\nNor ever\
      \ seen\nNo way to grasp\nWhat might have been\u2026\nA candle deep\n\nTheir\
      \ hands reach out for plastic stars\nWhile we trace constellations far\nThe\
      \ weight of sight, the cost of knowing\nThe pull of tides forever flowing\n\
      Some hearts beat loud with questions asked\nSome minds stay still in comfort\
      \ masked\n\nTwo worlds that spiral, never touch\nOne seeing all, one missing\
      \ much\n\nA candle deep\nLight in eyes\nWhat you seek\nThey tantalize\nIf never\
      \ had\nNor ever seen\nNo way to grasp\nWhat might have been\u2026\nA candle\
      \ deep\n\nAre those who see and strive to be\nBetter served than those made\
      \ empty\nWhen awareness brings its gravity\nAnd ignorance its cavity\nThe growing\
      \ possibility\nA curse on all who ask\u2026 \"Maybe?\"\n\nA candle deep\nLight\
      \ in eyes\nWhat you seek\nThey tantalize\nIf never had\nNor ever seen\nNo way\
      \ to grasp\nWhat might have been\u2026\nA candle deep\n\nThe light inside\n\
      Both gift and wound\nA torch we bear\nA weight assumed\nAnd sometimes in the\
      \ deepest night\nWe envy those without the sight"
