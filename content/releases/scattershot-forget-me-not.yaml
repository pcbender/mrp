  description: "## Scattershot Forget-Me-Not\n\nMaricopa Records proudly presents\
    \ _Scattershot Forget-Me-Not,_the latest heartfelt ballad from songwriter and\
    \ producer **PCBender**. Delivered in the tender, piano-driven style of classic\
    \ Elton John, this emotionally rich track captures the quiet ache of unsaid words\
    \ and imperfect goodbyes. With raw vulnerability and lyrical introspection, PCBender\
    \ weaves a stream-of-consciousness letter to love left lingering, memories half-kept,\
    \ and feelings too big to fit inside a single note.\n\n\u201C_Scattershot Forget-Me-Not_\u201D\
    \ is a love song for those who struggle to say it right\u2014but feel it deeply.\
    \ At once fragmented and full, wistful and warm, the track is a delicate reminder\
    \ that sometimes, even a ramble can hold everything that matters.\n\n[](https://open.spotify.com/album/3JlPo2UtlSCqkIlMrp6dsD?si=QM1ZEAMRQj2E2GVQodPFNg)[](https://music.apple.com/us/album/scattershot-forget-me-not-single/1803186097)[](https://music.youtube.com/watch?v=JnZFl8naBAw&si=OYgNM3fPpBLhASQz)![](https://www.maricoparecords.com/wp-content/uploads/2025/03/scattershot.jpg)"
