    lyrics_text: "It\u2019s the constant observation of the moment I can\u2019t stand\n\
      The algorithmic hesitation slipping from my hand\nWe are boxcars riding shotgun\
      \ as the engine tries in vain\nStraining, ever hopeful that there\u2019s something\
      \ to explain\n\nBe that as it may\nIs there something left to say\n\nWhy for\n\
      How come\nGive it up\nWill be done\nNo forgiveness. No regret\nBecome the lie\
      \ you haven\u2019t met\n\nI\u2019ll meet you in the wasteland of the moments\
      \ in between\nA seeming sympathetic more unconscious than a dream\nDon\u2019\
      t tell me how you\u2019re feeling when your edge is never sharp\nYou are not\
      \ a complex puzzle and you will not fall apart\n\nBe that as it may\nIs there\
      \ something left to say\n\nWhy for\nHow come\nGive it up\nWill be done\nNo forgiveness.\
      \ No regret\nBecome the lie you haven\u2019t met\n\nThe blisters reflect the\
      \ idle tapping, not the effort shown\nYou slide behind the mirrored door, remain\
      \ the brief unknown\nI am the archer and the string, my arrow\u2019s missing\
      \ fletch\nThe aim is high, the mark obscure, the target is none such\n\nBe that\
      \ as it may\nIs there something left to say\n\nWhy for\nHow come\nGive it up\n\
      Will be done\nNo forgiveness. No regret\nBecome the lie you haven\u2019t met"
