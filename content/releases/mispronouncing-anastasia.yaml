    lyrics_text: "The cursor blinks impatiently, awaiting inspiration\n\u201COh Calliope,\
      \ not an apostrophe,\u201D the inner critic chides\nA tone, a mood, some imagery\
      \ \u2014 a lurking desperation\nThe irony, an ode to me, and in the end he hides\n\
      \nThe couplet\u2019s scansion leaves its marks\nChiasmus lights, Chiasmus darks\n\
      \nMispronouncing Anastasia, read between the lines\nTrading feet with Cinderella,\
      \ an ode that\u2019s not yet free\nThe simile a smile, the pterodactyl as metaphor\n\
      An angry alliteration, the quill becomes allusion\u2026\nNever more\n\nMaking\
      \ nothing into thing \u2014 Oxymoron\u2019s bold antithesis\nVolta comes when\
      \ needed most, a light motif that draws me in\nConsonance, experience, and evidence\
      \ of innocence\nAre used with rhyme and words to scheme, the craft that makes\
      \ the song begin\n\nThe couplet\u2019s scansion leaves its marks\nChiasmus lights,\
      \ Chiasmus darks\n\nMispronouncing Anastasia, read between the lines\nTrading\
      \ feet with Cinderella, an ode that\u2019s not yet free\nThe simile a smile,\
      \ the pterodactyl as metaphor\nAn angry alliteration, the quill becomes allusion\u2026\
      \nNever more\n\nThe rhyme dissolves, the rhythm fades\nSyntax begins to stray\n\
      The meter sheds its borrowed cage\nAnd meaning walks away\n\nMispronouncing\
      \ Anastasia, read between the lines\nTrading feet with Cinderella, an ode that\u2019\
      s not yet free\nThe simile a smile, the pterodactyl as metaphor\nAn angry alliteration,\
      \ the quill becomes allusion\u2026\nNever more"
