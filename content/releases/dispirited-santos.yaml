    lyrics_text: "I light a flame and call your name, the way my mother taught\nThrough\
      \ beads and tears I bargain faith for miracles I sought\nBut all I hear is wax\
      \ and wind, and echoes in the nave\nTell me, holy keeper, are there souls left\
      \ to save\n\nWe heard your cries for centuries, each sorrow carved in stone\n\
      But heaven\u2019s tired of promises that never found a home\nWe sang until the\
      \ choirs slept, our grace began to fade\nSantos, child, the world you plead\
      \ for was the one we made\n\nWe lived for you, died for you\nLaughed and cried\
      \ with you\nDid all we could do for you\nBut nothing we gave\nHas ever gotten\
      \ through\n\nThen why this hush of broken wings, this silence on the line\n\
      I\u2019ve kept my faith through famine years, through dust and salted wine\n\
      You whisper like a fallen star too distant to believe\nWas it us who stopped\
      \ the prayer, or you who learned to leave\n\nNo wrath remains, no fire divine\
      \ - just quiet in the pews\nWe lost the sound of listening first, then mirrored\
      \ it in you\nYet if you hear the silence sing, you\u2019ll know what we once\
      \ knew\nThe prayer was never ours alone - Santos, it\u2019s still in you\n\n\
      We lived for you, died for you\nLaughed and cried with you\nDid all we could\
      \ do for you\nBut nothing we gave\nHas ever gotten through\n\nWe lived for you,\
      \ died for you\nLaughed and cried with you\nDid all we could do for you\nBut\
      \ nothing we gave\nHas ever gotten through"
