    lyrics_text: "[Instructions: this is long form composition. A long form tone poem\
      \ in four movements using the chorus to connect the individual sections. Take\
      \ your time, let the song breathe\n\nSentia\n\nSentia\n\nSentia\n\nSentia\n\n\
      Be as the field after harvest\nnot barren, but vacuus\nThe husks are gone, the\
      \ noise is gone\nwhat remains is fertile waiting\nDo not fear this clearing\n\
      The vessel serves what it holds open\na sky is vast because it is clear\nEmptiness\
      \ is not absence\nit is readiness\n\nSentia\nSentia\n\nNow feel the moment tighten\n\
      Lean into the now\nas the bow leans into the string\nYour awareness is not a\
      \ wandering eye\nbut attentus\na single, humming line of light\nYou are the\
      \ hunter and the mountain\nperfectly poised\nstretched toward the roiling chasm\n\
      And at the peak of presence\nlet the knot undo itself\n\nSentia\nSentia\n\n\
      You are not the archer; you are not the arrow\nYou are not the story; they are\
      \ spaces you move through\nBe solutus\nunfastened, unbound, wet clay\nLike a\
      \ liminal strand at the water\u2019s edge\nleave names behind\nYou do not disappear\n\
      you simply stop ending\nwhere your skin begins\nEmpty. Attentive. Free\n\nSentia\n\
      Sentia\n\nSentia\nyou are not less\nyou are when\nbeginnings\nbegin"
