    lyrics_text: "I left with nothing but a name\nThe rest got buried in the rust\n\
      The road was hard, the sky was flame\nBut I kept walking but only just\n\nI\
      \ feel the sun upon my face\nMy back against the coming gray\nI see the light,\
      \ I know the pace\n\nOn down the way\nOn down the way\n\nA voice I loved still\
      \ haunts me now\nA touch remains in every step\nBut time can\u2019t smooth the\
      \ hurt anyhow\nThough even now, I can\u2019t accept\n\nI feel the sun upon my\
      \ face\nMy back against the coming gray\nI see the light, I know the pace\n\n\
      On down the way\nOn down the way\n\nNot every mile is meant to fade\nSome just\
      \ learn to disobey\nWhat you keep and and what you\u2019d trade\nYou\u2019ll\
      \ get the chance\u2026\n\nOn down the way\nOn down the way\n\nI feel the sun\
      \ upon my face\nI\u2019ve made my peace with what won\u2019t stay\nI\u2019m\
      \ moving still, and that\u2019s my grace\n\nOn down the way\nOn down the way"
