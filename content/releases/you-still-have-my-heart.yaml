  description: '## You Still Have My Heart


    A pulsing heartbeat of 80s pop-rock nostalgia, **"You Still Have My Heart"**delivers
    a powerful blend of jangly guitars, driving basslines, and soaring harmonies.
    STAB’s raw yet melodic vocals capture the ache of lost love and lingering connection,
    painting a vivid picture of longing beneath a star-lit sky. With an anthemic chorus,
    warm analog production, and an irresistible hook, this track is both emotionally
    charged and undeniably catchy.


    Perfect for fans of classic 80s rock with a modern edge, **"You Still Have My
    Heart"**is a heartfelt anthem that lingers long after the last note fades.


    [](https://open.spotify.com/album/470JRdtsu3uzdfv741DLxg?si=tpJ6nFZLTvODOEKoNYOcZQ)[](https://music.apple.com/us/album/you-still-have-my-heart-single/1797996492)![](https://www.maricoparecords.com/wp-content/uploads/2025/02/You-Still-Have-My-Heart-Landr.png)'
