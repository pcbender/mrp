    lyrics_text: "Before the word, there was the wave\nA hum, a wind, a cry to save\n\
      The fire cracked, the river sang\nAnd hearts replied with open hands\n\nElemental,\
      \ fundamental\nFrom the root of every soul\nWe were born in breath and rhythm\n\
      And the song has made us whole\nElemental, fundamental\nThe first gift that\
      \ ever came\nIn the silence of creation\nWe remembered how to name\n\nThe trees\
      \ would speak in harmony\nThe stars would hum a melody\nAnd we, like echoes\
      \ taking flight\nTurned sound to meaning, dark to light\n\nElemental, fundamental\n\
      From the root of every soul\nWe were born in breath and rhythm\nAnd the song\
      \ has made us whole\nElemental, fundamental\nCarried forward, ever true\nIn\
      \ the cradle of the moment\nIs the voice that sings through you\n\nWe listened\
      \ to the wind and flame\nAnd shaped our truth with breath and frame\nWhen silence\
      \ asked what life could be\nWe answered with a melody\nThat ancient ache for\
      \ something else\u2014\nWhen we first tried to sing the world back to itself\n\
      \nElemental, fundamental\nLet the world be tuned again\nTo the music we were\
      \ born from\nTo the song that has no end\nElemental, fundamental\nFrom the heartbeat\
      \ to the sky\nWe are singing now together\nAnd the song will never die"
