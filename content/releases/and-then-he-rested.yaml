    lyrics_text: "Road dust scuffs his well worn boots\nA guitar case packed with\
      \ worn-out truths\nCrowds cheered loud but the silence speaks\nNow he dreams\
      \ of peace, not crowds or flights\n\nHotel pillows stiff as stone\nBright lights\
      \ but he's all alone\nOld applause like footsteps fades\nNow time to pause the\
      \ sweet charade\n\nAnd then he rested\nClosed his eyes\nUnder his roof\nBeneath\
      \ his skies\nThe road fell silent\nThe chords went still\nHis heart found home\
      \ and always will\n\nTales he sang carved deep within\nA life of echoes, a weary\
      \ hymn\nPhone calls can\u2019t relive the tale\nHe finished strong too tired\
      \ to fail\n\nAnd then he rested\nClosed his eyes\nUnder his roof\nBeneath his\
      \ skies\nThe stage grew dim\nThe chords fell still\nHis heart found home and\
      \ always will\n\nEvery mile whispered stay, don't go\nBut the fans called for\
      \ one more show\nAt last, the road loops back around\nSweet serenity now softly\
      \ found\n\nAnd then he rested\nClosed his eyes\nUnder his roof\nBeneath his\
      \ skies\nThe stage grew dim\nThe chords fell still\nHis heart found home and\
      \ always will\n\nAnd then he rested\nAnd then he rested\nAnd then he rested\n\
      His heart came home and always will"
