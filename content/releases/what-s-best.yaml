    lyrics_text: 'A count, a king, a pauper born

      In turn each guise the hat I’ve worn

      Though time appears to be precise

      Each life is as a passing storm


      While in the frame we pay the price

      Of memory and ignorance

      Oh, would we dare to hold the flame

      To live each full and see them twice


      I pray to live, I must attest

      The rules not fair in this contest

      And trust the gods to know what’s best

      And trust the gods to know what’s best


      As blocks of stone each look the same

