    lyrics_text: "I wake to walls I\u2019ve seen too long\nA half-remembered morning\
      \ song\nThe mirror shows a memory\nSoft around the edges, quietly\n\nIndolent\
      \ heart, slow to start\nBeating time in the dark\nStirred by chaos, calmed by\
      \ art\nStill an indolent heart\n\nOnce I chased a flicker in the wind\nA voice\
      \ too strange to let begin\nThe rhythm broke, the silence cracked\nThen order\
      \ came and pulled it back\n\nIndolent heart, slow to start\nBeating time in\
      \ the dark\nStirred by chaos, calmed by art\nStill an indolent heart\n\nThere\u2019\
      s a storm outside my chest\nBut the windows never break\nI feel the tremble,\
      \ then forget\u2014\nA stir, a pause, a small escape\n\nIndolent heart, soft\
      \ and slow\nStill afraid of what it knows\nBut every silence has a spark\u2014\
      \nA whisper deep inside the dark\n\nI move, I stay\nI hum, I stray\nNo anthem,\
      \ no fresh start\nBut not yet gone\u2014my indolent heart"
