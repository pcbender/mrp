    lyrics_text: 'Seaward slack, a stay unset

      She hides the things she can''t forget

      A windward silhouette

      Of something waiting


      She''s drawing, a trailing sea

      A pulsing urge to feel the lee

      A drifting story

      Of something fading


      Seaward sings her soft refrain

      Some things are lost and some remain

      The telltales caution "mind the vane"

      A rising tide when Seaward calls


      Mast firm set, her headsail clean

      She sets her track to things unseen

      A wake without a sounding trace

      Like something silent missed


      Her compass cast in pale reflection

      Still she draws her destination

      A quiet contradiction

      Like something dismissed


      Seaward sings her soft refrain

      Some things are lost and some remain

      The telltales bold "you found your name"

      A flooding tide as Seaward calls


      She bends the sheet, begins to heel

      Remembers how the stays feel

      Too few hours left to steal

      Like a ship upon a reef


      She dreams the drawing mainsail

      The breakers do prevail

      No longer subject to the gale

      Time is not the thief


      Seaward sings her soft refrain

      Some things are lost and some remain

      The telltales sigh "not the same"

      A falling tide as Seaward calls'
