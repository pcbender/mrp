    lyrics_text: 'Album cover artwork for an alt-rock single titled “June Gloom” by
      the artist “STAB”. Minimalist, desaturated coastal scene with a seamless gradient
      transition: pale sand dissolving into a calm steel-blue ocean dissolving into
      a flat gray sky, near-horizonless and almost indistinguishable boundaries. No
      sun, no dramatic lighting, no god rays; soft, uniform overcast illumination
      with zero highlights


      A solitary female figure wearing a simple bikini with a sheer, lightweight cover-up,
      sitting on a beach chair on the sand, centered, facing the camera. She looks
      gloomy and emotionally distant; heavy posture, shoulders slightly slumped, hands
      resting loosely, tired eyes, unsmiling expression. Keep the overall composition
      clean with large negative space; subject small-to-medium in frame (not filling
      the cover), lots of sky and empty space


      Subtle film grain, slight texture like fine art photography / analog scan, muted
      palette (cool grays, blue-gray, sand beige), quiet and bleak mood


      Typography integrated: “June Gloom” at the top (upper margin), large distressed
      condensed sans-serif with slight blur/ink-bleed; “STAB” smaller beneath it or
      top-right, spaced lettering. Only these two text elements; no logos, no extra
      words, no border'
