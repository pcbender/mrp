    lyrics_text: 'Lines divide

      Not to bind, but to guide

      Movement follows

      What was decided

      Colors fade

      Boundaries stay

      Signals flash

      But silence obeys


      Not the path

      but the choosing

      Not the line

      but the leaning

      Let the lanes

      be drawn in motion

      Let the rules

      be made by moving


      Slope invites

      What flat denies

      A gentle rise

      Becomes a flight

      Exit unseen

      Until the need

      Departure whispered

      Not decreed


      Not the path

      but the choosing

      Not the line

      but the leaning

      Let the lanes

      be drawn in motion

      Let the rules

      be made by moving


      Curves become

      The lines to come

      No map holds

      What must be run

      Each ascent

      Reveals design

      Every turn

      Another sign


      Not the path

      but the choosing

      Not the line

      but the leaning

      Let the lanes

      be drawn in motion

      Let the life

      be made by moving'
