    lyrics_text: "You nursed a drink by candlelight\nAs rain made lace on cobblestone\n\
      The inn was old, the name half-flecked\nIn paint too faded to have known\n\n\
      The barkeep said, \u201CYou hike, you said\nThen take the left at Linden See\n\
      No signs\u2014just fern and fallen pine\u2026\nThere\u2019s talk of women there..\u201D\
      \ \u2014Idisi\n\nOn the way that comes before\n\nThe morning came with colder\
      \ light\nYou walked alone beyond the hill\nPast mossy stones and rusted signs\n\
      The world grew older, older still\n\nThe trees leaned close, the path grew thin\n\
      A silence pooled where birds don\u2019t go\nAnd though no gate or marker stood\u2014\
      \nYou crossed beneath a breathless bough\n\nOn the way that comes before\n\n\
      They stood where roots entwined like veins\nIn robes the color dusk forgets\n\
      With wreaths of rowan, faces veiled\nAnd silence drawn like silhouettes\n\n\
      One raised her hand\u2014but not to stop\nAs if to speak through stillness true\n\
      You felt the weight you\u2019d never named\nBegin to lift\u2026 without adieu\n\
      \nOn the way that comes before\n\nNo words were said, no rites performed\nNo\
      \ hand was placed upon your chest\nBut something old slipped through your skin\u2014\
      \nRegret you hadn\u2019t laid to rest\n\nThe names you wore, the roles you played\n\
      The ghosts that whispered in your sleep\nThey fell like threads cut from a loom\n\
      Too fine to grieve, too deep to keep\n\nOn the way that comes before\n\nYou\
      \ woke beneath a younger sky\nThe trail behind was overgrown\nThe trees looked\
      \ on with kinder bark\nBut not a trace of what was shown\n\nYou passed the inn\
      \ by lantern light\nThe barkeep gone, the sign askew\nAnd wondered if you\u2019\
      d ever left\u2014\nOr if the Idisi walked with you\n\nOn the way that comes\
      \ before\n\nOn the way that comes before\nOn the way that comes before\nOn the\
      \ way that comes before"
