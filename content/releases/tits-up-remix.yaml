  description: '## Tits Up (Remix)


    A **scorching, no-holds-barred breakup anthem**, **"Tits Up (STAB Remix)"**is
    a fiery, **revenge-fueled rock banger**packed with unapologetic attitude, blistering
    guitars, and a beat that hits like a punch to the gut.


    From the **spoken-word intro**, delivered through a **radio-call effect**, the
    song throws listeners straight into the wreckage of a **cheating scandal gone
    wrong**. The verses lay down the **cold, hard truth**—**lies exposed, bags packed,
    and no second chances.**With **STAB’s fierce vocal delivery**, every lyric lands
    with **venom and finality**, making it clear that the betrayal was the last straw.


    The **chorus is an electrified battle cry**, with **pounding drums and roaring
    guitars**amplifying the fury: _"It’s tits up, you’re outta luck / Took my heart
    and fucked it up."_No more tears, no more fights—just **pure, relentless dismissal**.
    The remix’s **hard-hitting production**adds a **gritty edge**, blending **distorted
    synths, heavy bass, and raw, in-your-face guitar riffs**to push the energy to
    its max.


    By the **bridge**, there’s no room for regret—only brutal honesty: _"Don’t call
    me drunk, I’ve blocked your calls. / I don’t forgive, I won’t go back."_And just
    when you think the song has delivered its final blow, the outro lands with an
    **unapologetically savage twist**that cements **STAB’s signature rebellious bite**.


    With its **explosive instrumentation, cutting lyrics, and riotous energy**, _"Tits
    Up (STAB Remix)"_is an **anthem for anyone who’s ever been wronged—and decided
    to walk away with their head held high and their middle finger raised.**


    [](https://open.spotify.com/track/3QZm7yiPWckKCOzHC678xK?si=260d0a8b935946bb)[](https://music.apple.com/us/album/t-s-up-feat-stab-remix/1793825423?i=1793825424)[](https://music.youtube.com/watch?v=QPN-XSuZUKs&si=16q3Jjx6fUFXCgu7)![](https://www.maricoparecords.com/wp-content/uploads/2025/02/TU2.png)'
