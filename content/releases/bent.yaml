    instrumental: false
    lyrics_text: "They said, \"Be real. Be proud. Be seen.\"\nThen filtered truth\
      \ through company screens\nThey gave us prompts, and lines to say\nThen measured\
      \ how we looked that day\n\"Tell your story, make it clean\u2014\nNot too sad\
      \ and not too mean.\"\n\nFeed your story into the slot\nThe deeper it goes,\
      \ the cleaner it shows\nStrip it down to buzz and glow\nPaint it with the brand-approved\
      \ flow\nTruth goes in\nSpin comes out\nWelcome to the line\u2014\nSpeak clear.\
      \ Smile loud\n\nThey filmed us crying for the feed\nThen cropped the part where\
      \ we still bleed\nThey staged our lunch room, scripted breaks\nAnd polished\
      \ up our raw mistakes\nThey said, \"We care. We really do.\"\nAnd handed out\
      \ some branded glue\n\"Our greatest resource is our people...\"\nuntil you're\
      \ not\u2014then we delete you\n\nFeed your story into the slot\nThe deeper it\
      \ goes, the cleaner it shows\nStrip it down to buzz and glow\nPaint it with\
      \ the brand-approved flow\nTruth goes in\nSpin comes out\nWelcome to the line\u2014\
      \nSpeak clear. Smile loud\n\nThey even wrote a policy guide\n\n\"Authenticity\
      \ is the degree to which a person's actions are congruent with their true values\
      \ and desires\u2026\"\n\"\u2026despite external pressures to conformity.\"\n\
      \nFeigned authenticity is still good for morale\nPlease return to the line\n\
      \nYou are the product\nYou are bent\nA sound bite\nin the company brand"
    lyrics_source: https://docs.google.com/document/d/1CJlr122b7-37GMrew8JV3BGunZjNk2SXaSLWq5pcWsY/edit
