  - number: 1
    title: Mr. McKay
    slug: mr-mckay
    isrc: CAGOO2558703
    duration: '4:59'
    explicit: false
    preview_audio: null
    links:
      apple_music: https://music.apple.com/us/album/mr-mckay/1816826240?i=1816826241
      youtube: https://www.youtube.com/watch?v=WugupYbT7_Y
      youtube_music: https://music.youtube.com/watch?v=WugupYbT7_Y
      spotify: https://open.spotify.com/track/7jTdQI03xBG958VySNrW60
    instrumental: false
    lyrics_text: 'A meager man not born of wealth

      But hungry for the crown

      With teeth too white and eyes too still

      He tears down those on high

      He speaks in graphs and gospel tones

      Then bleeds the gold from gray

      And when the line begins to rise

      Now welcome Mr. McKay


      He says: "To the moon. Through the flame."

      "You''re not a person—just a name."

      "There''s joy in pain, and worth in strain—

      Disruption is the way."

      They nod, they clap, they sign, they bend—

      The cost you cannot weigh

      A thousand bent with just one click

      He never needs to stay


      His tongue is gold, his timing keen

      He listens just enough

      Reflects your dreams in polished terms

      And sells you futures rough

      He rewrites mission statements clean

      Turns your purpose into play

      And when you start to doubt yourself

      You''re thinking his way


      He says: "To the moon. Through the flame."

      "The numbers rise. You feel the same."

      "Your loss is growth. Your job''s a phase—

      The market must obey."

      They nod, they clap, they sign, they bend—

      Each echo, his display

      A thousand bent with just one click

      He never needs to stay


      He leaves before the boiling point

      Just as the cracks appear

      He''s always gone before the fall

      But you will keep him near

      In slogans hung on hallway walls

      And values none can say

      You call it culture

      He calls it prey

      You called him boss—

      He was decay

      The poison

      Stays


      The desks sit empty, dreams half-built

      The funding''s dried away

      But still his voice echoes the halls

      "Tomorrow starts today"

      They''re picking up the pieces now

      Of what he burned for fame

      While somewhere else he''s found new marks

      Who''ve never heard his name'
    lyrics_source: https://docs.google.com/document/d/1CJlr122b7-37GMrew8JV3BGunZjNk2SXaSLWq5pcWsY/edit
  - number: 2
    title: The Bend
    slug: the-bend
    isrc: CAGOO2558704
    duration: '4:02'
    explicit: false
    preview_audio: null
    links:
      apple_music: https://music.apple.com/us/album/the-bend/1816826240?i=1816826242
      youtube: https://www.youtube.com/watch?v=4hoiO6pgJKY
      youtube_music: https://music.youtube.com/watch?v=4hoiO6pgJKY
      spotify: https://open.spotify.com/track/58CvMpjjtb0b4R0j6nfw0k
    instrumental: false
    lyrics_text: 'We are The Bend, where the metal sings

      Where Mom and Pop build useful things

      No titles here, just names and pride

      A dozen towns where craft resides


      Each piece we make, we stamp by hand

      A mark that says: "I understand"


      We sponsor teams, we fix the parks

      We build our lives into these parts

      No spreadsheets here, just flesh and bone

      A place that feels a bit like home


      The cafe smells like stew

      And everyone knows what you''ve been through


      We are The Bend, where the work is real

      Where you know a name by how it feels

      The weld is clean, the edge is square

      You feel the love in the metal there

      The margins tight, the days are long

      But good is good, and right is strong


      Our softball team wears "Bent" with pride

      Green jerseys with our name inscribed

      We chose that name—it felt like us

      Strong enough to bend, no fuss


      When someone says "Go get ''em, Bent\!"

      We know exactly what they meant


      Mom and Pop grew tired and gray

      Said, "Time to let the new one play."

      Young Dirk with suit and MBA

      Took the floor and found his way


      He says we''re more than bolts and beams

      He talks in markets, talks in dreams


      We are The Bend, where the work is real

      Where you know a name by how it feels

      The weld is clean, the edge is square

      You feel the love in the metal there

      The margins tight, the days are long

      But good is good, and right is strong


      The signs are new, the paint is clean

      He swapped the blueprint for a screen

      The words still warm, but something''s off

      The breakroom talks in nervous coughs


      We are The Bent—but not the same

      The pieces fit, but not the name

      The weld is clean, the edge still true

      But something cold is seeping through

      The margins hold. The lines are crossed

      And no one stops to ask the cost'
    lyrics_source: https://docs.google.com/document/d/1CJlr122b7-37GMrew8JV3BGunZjNk2SXaSLWq5pcWsY/edit
  - number: 3
    title: Below The Line
    slug: below-the-line
    isrc: CAGOO2558715
    duration: '4:50'
    explicit: false
    preview_audio: null
    links:
      apple_music: https://music.apple.com/us/album/below-the-line/1816826240?i=1816826243
      youtube: https://www.youtube.com/watch?v=mjBFbnIJ5Gs
      youtube_music: https://music.youtube.com/watch?v=mjBFbnIJ5Gs
      spotify: https://open.spotify.com/track/63OG44zLfUGeaX2Hw7xYlN
    instrumental: false
    lyrics_text: 'Dirk wore the name like a borrowed coat

      It fit him fine, but scratched his throat

      He walked the floor but didn''t see

      What Mom and Pop had meant to be

      The numbers whispered, "You''re not enough"

      The charts were flat, the margins tough

      He craved much more than pride and steel

      He needed someone to make it real


      Then one gray morning at his desk

      McKay appeared with a golden slide

      Said, "Legacy''s nice—but scale''s your guide"

      He spoke of vision, teams, and flow

      Of agile minds and vertical growth

      He said, "The line''s not profit—it''s thought"

      "Your people fail when they think what they''re not"

      "Culture''s a lever. Use it right."

      "Above the line, you win the fight."


      (Above the line) - you lead with grace

      (Below the line) - you lose your place

      (Above the line) - you show you care

      (Below the line) - you''re unaware

      (You''re not fired) - you''re out-placed

      (You''re not sad) - you''re misaligned

      (You''re not angry) - you''re just Below the Line


      We filled out forms with perfect grace

      Learned how to smile at our own pace

      We played the game, we joined the call

      Said nothing true, said nothing at all

      They tracked our joy in colored charts

      Gave us a score to match our hearts

      And when we cried, they changed the frame—

      "You''re not upset. You''re just ashamed."


      He heard the grumbles through the halls

      The nervous laughs, the distant calls

      He read the note from Mom last night—

      "Don''t lose the heart. Don''t lose the light."

      He asked McKay if things felt wrong

      McKay just smiled and said, "Stay strong."

      "This friction means the change is near—

      The line divides the doubt from clear."


      Word games are a coward''s tool

      (You''re not tired) - you''re unaligned

      (You''re not fired) - you''ve been out-placed

      (You''re not mad) - you''re Below the Line

      We used to be the name on steel

      Now we''re a number, masked as feel

      We used to speak

      Now we perform

      The weather changed—

      And we were the storm


      (Above the line) - you lead with grace

      (Below the line) - you lose your place

      (Above the line) - you grow, you shine

      (Below the line) - you''re out of time

      (You''re not broken) - you''re non-compliant

      (You''re not sad) - you''re just defiant

      (You''re not worthy) - you''re misaligned

      (You''re not hurting) - you''re Below the Line


      There used to be stew in the breakroom air

      A joke, a name, a coat left there

      A metal stamp that said, "I care"

      But now the words just echo... square

      Bent below the line…'
    lyrics_source: https://docs.google.com/document/d/1CJlr122b7-37GMrew8JV3BGunZjNk2SXaSLWq5pcWsY/edit
