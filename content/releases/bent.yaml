    lyrics_text: "Name's Bentley\nMost call me Bent\nWorked here since the floor was\
      \ poured\nThey used to say we were a family\nThen a team\nThen just... The Bent\n\
      Guess that stuck\n\nThirty-six years on this stretch of floor\nI've fixed this\
      \ gate, this lock, that door\nI watched them come. I watched them go\nI swept\
      \ the ruins of what we'd known\nThey called it progress. They changed the sign\n\
      Said \"We bend the future.\"\u2014well, so did I\n\nWe hit the targets. We met\
      \ the mark\nThey lit the fuse and praised the spark\nThey took their cut. We\
      \ bore the cost\nAnd now I'm left to weigh what's lost\nI ask aloud, to ghost\
      \ and frost\u2014\nWe played the game... but at what cost\n\nI knew their names,\
      \ before the scans\nBefore the charts replaced our hands\nWe hung our coats\
      \ on numbered racks\nWe cheered when Mary's boy came back\nAnd every year, the\
      \ list grew thin\nThey paved the lot and painted \"WIN\"\n\nWe hit the targets.\
      \ We met the mark\nThey lit the fuse and praised the spark\nThey took their\
      \ cut. We bore the cost\nAnd now I'm left to weigh what's lost\nI ask aloud,\
      \ to ghost and frost\u2014\nWe played the game... but at what cost\n\nThey got\
      \ their growth\nThey rang that bell\nThey sold their lies\nAnd still slept well\n\
      I locked the gates\nThe wind blew through\nAnd I remember what they won't do\n\
      \nWe bend, we broke, we gave, we stayed\nWe traded time the rich repaid\nThey\
      \ walked away when lines were crossed\nAnd left us holding all that's lost\n\
      So I sign off. I drop the key\nThe lights go dark behind me\nThe Bent remember\
      \ what they lost\u2014\nThey say it's paid\nBut at what cost\n\nAt what cost\n\
      At what cost"
