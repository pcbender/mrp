    instrumental: false
    lyrics_text: 'A meager man not born from wealth

      With teeth too bright to trust

      Held out a nail, said "This is gold—

      If you believe, you must."


      The Bent gave wood, the Bent gave flame

      They gave him all they grew

      He smiled and stirred the rising steam

      And said, "This feeds us too."


      But the nail was his

      The bowl was his

      The price was what he named

      The Bent built all

      But owned no part

      And he forgot their names


      And so the trade began

      The pot grew full, then fuller still

      The Bent were growing thin

      He sold them back their portioned hope

      And said, "That''s how we win."


      But the nail was his

      The bowl was his

      The price was what he named

      The Bent built all

      But owned no part

      And he forgot their names


      Now gold spoons scrape on empty steel

      No hands are left to serve

      You can''t eat yield

      You can''t drink growth

      You can''t take what was never yours


      The nail remains

      The pot is cold

      The Bent are bone and breath

      You called it wise

      But it was greed—

      And now there''s nothing left to feed'
    lyrics_source: https://docs.google.com/document/d/1CJlr122b7-37GMrew8JV3BGunZjNk2SXaSLWq5pcWsY/edit
  - number: 5
    title: Authenticity Factory
    slug: authenticity-factory
    isrc: CAGOO2558706
    duration: '4:07'
    explicit: false
    preview_audio: null
    links:
      apple_music: https://music.apple.com/us/album/authenticity-factory/1816826240?i=1816826245
      youtube: https://www.youtube.com/watch?v=XJtVY8thCTA
      youtube_music: https://music.youtube.com/watch?v=XJtVY8thCTA
      spotify: https://open.spotify.com/track/7icwguUrTo4r93mqovN3DM
    instrumental: false
    lyrics_text: 'They said, "Be real. Be proud. Be seen."

      Then filtered truth through company screens

      They gave us prompts, and lines to say

      Then measured how we looked that day

      "Tell your story, make it clean—

      Not too sad and not too mean."


      Feed your story into the slot

      The deeper it goes, the cleaner it shows

      Strip it down to buzz and glow

      Paint it with the brand-approved flow

      Truth goes in

      Spin comes out

      Welcome to the line—

      Speak clear. Smile loud


      They filmed us crying for the feed

      Then cropped the part where we still bleed

      They staged our lunch room, scripted breaks

      And polished up our raw mistakes

      They said, "We care. We really do."

      And handed out some branded glue

      "Our greatest resource is our people..."

      until you''re not—then we delete you


      Feed your story into the slot

      The deeper it goes, the cleaner it shows

      Strip it down to buzz and glow

      Paint it with the brand-approved flow

      Truth goes in

      Spin comes out

      Welcome to the line—

      Speak clear. Smile loud


      They even wrote a policy guide


      "Authenticity is the degree to which a person''s actions are congruent with
      their true values and desires…"

      "…despite external pressures to conformity."


      Feigned authenticity is still good for morale

      Please return to the line


      You are the product

      You are bent

      A sound bite

      in the company brand'
    lyrics_source: https://docs.google.com/document/d/1CJlr122b7-37GMrew8JV3BGunZjNk2SXaSLWq5pcWsY/edit
