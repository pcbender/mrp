    instrumental: false
    lyrics_text: "They're just some motherfuckers\nThe reason to remind these motherfuckers\n\
      Is cashing down the backers\nThrowing the two buckets into one\nMoney when it's\
      \ all well\n\nIt's like a bad dream\u2026\nI am in a pen, all dressed the same\n\
      The Bent are in here with me\nA light\u2014it flashes quickly\nI see the number\
      \ three\nThe others too have numbers\nMost different from me\nWe stand before\
      \ a press\nAnd force the mandrel down\nWe do this without stopping\nAnd never\
      \ make a sound\nThe minders walk among us\nMaking notes upon a pad\n\nI've tried\
      \ to track the numbers\nI've watched them rise and fall\nOne Bent slept through\
      \ second bell\nAnd now he's not here at all\nAnother dropped her mandrel\nHer\
      \ number dropped to two\nShe wept\u2014but only briefly\nThen she was taken\
      \ too\nI thought it was performance\nBut no one works less hard\nI thought it\
      \ was behavior\nBut they hold all the cards\nThere's whispers of a formula\n\
      But no one knows the sum\nThe screen just flickers softly\nAnd hums to make\
      \ us numb\n\nPeople ain\u2019t numbers. You can\u2019t reduce\nA hand to score,\
      \ a name to use\nWe built this place before the war\nBefore the metrics, masks,\
      \ and lore\nAin\u2019t no chart that cares for pain\nNo slogan grace when names\
      \ get drained\nWe helped each other\u2014that was real\nNow ghosts sign off\
      \ what bots conceal\n\nThis morning I was still a three\nI kept my pace mechanically\n\
      I wiped the press, I checked the gate\nI said no words. I wasn't late\nBut mid-shift\
      \ brought a subtle tone\nMy chestplate flashed, the digit shone\nThe minders\
      \ came. I did not run\nNo trial, no form\u2014just marked: \"One\"\n\nPeople\
      \ ain\u2019t numbers. You can\u2019t reduce\nA hand to score, a name to use\n\
      We built this place before the war\nBefore the metrics, masks, and lore\nAin\u2019\
      t no chart that cares for pain\nNo slogan grace when names get drained\nWe helped\
      \ each other\u2014that was real\nNow ghosts sign off what bots conceal\n\n\"\
      The scores are calculated fairly\"\n\"Based on factors we don't share\"\n\"\
      The system knows what's needed\"\n\"So stay focused. Just do more\\!\"\n\"Questions\
      \ show misalignment\"\n\"Your pain serves the greater gain\"\n\nPeople ain\u2019\
      t numbers. You can\u2019t reduce\nA hand to score, a name to use\nWe built this\
      \ place before the war\nBefore the metrics, masks, and lore\nAin\u2019t no chart\
      \ that cares for pain\nNo slogan grace when names get drained\nWe helped each\
      \ other\u2014that was real\nNow ghosts sign off what bots conceal\n\nNo reason\
      \ given. No mistake\nJust hands that guide and eyes that take\nNo farewells,\
      \ no one allowed\nThe floor resumes. The heads stay bowed\nI was a name. I was\
      \ a hand\nNow I am dust inside the plan\nThe screen goes dark\nThe door slides\
      \ wide\nAnd I am\nnothing\nnow"
    lyrics_source: https://docs.google.com/document/d/1CJlr122b7-37GMrew8JV3BGunZjNk2SXaSLWq5pcWsY/edit
