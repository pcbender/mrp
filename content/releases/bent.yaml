    lyrics_text: "A meager man not born from wealth\nWith teeth too bright to trust\n\
      Held out a nail, said \"This is gold\u2014\nIf you believe, you must.\"\n\n\
      The Bent gave wood, the Bent gave flame\nThey gave him all they grew\nHe smiled\
      \ and stirred the rising steam\nAnd said, \"This feeds us too.\"\n\nBut the\
      \ nail was his\nThe bowl was his\nThe price was what he named\nThe Bent built\
      \ all\nBut owned no part\nAnd he forgot their names\n\nAnd so the trade began\n\
      The pot grew full, then fuller still\nThe Bent were growing thin\nHe sold them\
      \ back their portioned hope\nAnd said, \"That's how we win.\"\n\nBut the nail\
      \ was his\nThe bowl was his\nThe price was what he named\nThe Bent built all\n\
      But owned no part\nAnd he forgot their names\n\nNow gold spoons scrape on empty\
      \ steel\nNo hands are left to serve\nYou can't eat yield\nYou can't drink growth\n\
      You can't take what was never yours\n\nThe nail remains\nThe pot is cold\nThe\
      \ Bent are bone and breath\nYou called it wise\nBut it was greed\u2014\nAnd\
      \ now there's nothing left to feed"
    lyrics_source: https://docs.google.com/document/d/1CJlr122b7-37GMrew8JV3BGunZjNk2SXaSLWq5pcWsY/edit
