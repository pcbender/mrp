    lyrics_text: 'He waits in stillness

      Above the canyon walls

      She rises golden

      As the daylight calls


      They meet in hush

      Just before the heat

      No need to speak

      The cycle repeats


      Some say it’s light

      Just sky and sun

      But I’ve seen them touch

      Before she runs


      It isn’t science

      It isn’t retreat

      It’s love

      Where sky and morning meet


      She trails color

      Across his skin

      He holds her

      Without holding in


      No vows to break

      No promises kept

      Just that quiet moment

      Before they part


      Some say it’s light

      Just sky and sun

      But I’ve seen them touch

      Before she runs


      It isn’t myth

      But it’s complete

      This love

      Where sky and morning meet


      You and I-

      We’re made for that hour

      Brief

      Bright

      Becoming together'
