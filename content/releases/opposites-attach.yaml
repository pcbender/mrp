    lyrics_text: 'War and peace

      Profit and poverty

      Open and closed

      Slave and free

      Covert and overt

      Fear and trust

      Loud and still

      Ash and dust


      They don’t collide, they intertwine—

      Into the outer

      Opposites attract in time


      Love and hate

      Push and pull

      Tender and sharp

      Empty and full

      Sun and shadow

      Rise and fall

      Silk and iron

      Nothing and all


      They twist, they tangle, never match—

      Into the outer

      But opposites attract


      Truth and lie

      High and low

      Fast and slow

      Yes and no

      Order and chaos

      Knife and thread

      Breath and silence

      Living and dead


      Not black and white, but every crack—

      Into the outer

      Where opposites attract


      Sacred and broken

      Flesh and flame

      Known and nameless

      Pride and shame

      Stone and water

      Grace and lack

      What pulls apart

      Still circles back


      The tether holds, the lines collapse—

      Into the outer

      When opposites attract


      Into the outer

      When opposites attract'
