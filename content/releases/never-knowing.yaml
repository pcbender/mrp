    lyrics_text: "Album cover artwork: a hyperrealistic Tibetan sand mandala viewed\
      \ from directly overhead (perfect 90-degree top-down POV). Intricate concentric\
      \ geometry made of vividly colored sand grains (turquoise, saffron, crimson,\
      \ lapis, white), razor-sharp detail of individual grains. In the exact center,\
      \ the mandala is dissolving downward into a dark circular void as if a stopper\
      \ was pulled from below: sand spirals inward, forming a subtle vortex and a\
      \ clean round \u201Cdrain\u201D opening; the center is noticeably darker and\
      \ deeper, with soft shadow falloff into the hole. Surrounding mandala remains\
      \ pristine and symmetrical, with a gentle gradient of displaced sand toward\
      \ the center. Studio-clean presentation on a neutral matte surface, dramatic\
      \ but realistic lighting, high micro-contrast, ultra-detailed texture, cinematic\
      \ realism, no people, no hands, no text, no logos, no border, album-cover composition\
      \ with strong central focal point"
