    lyrics_text: "The song I sing is less than meets the eye\nThe words are meant\
      \ to hear and wonder why\nIf at first you don't get me, then maybe\nIt is better\
      \ to try again and see\n\nI borrowed lines from fortune cookies' grace\nThen\
      \ twisted them to hide a second face\nA watched pot sings, a stitch might still\
      \ delay\u2014\nBut meaning shifts when phrased a certain way\n\nThese lines\
      \ were bent, not broken\nEach word a clue, not a joke\nIf it catches in your\
      \ throat\u2014\nThat's the thread I hope you pull\nI turned a phrase, not just\
      \ to play\u2014\nBut to see what you'd unveil\nWhat stirred inside the sideways\
      \ way\n(Inquire....) Follow the trail\n\nWe all turn a phrase, we all bend a\
      \ line\nMake sense of the noise, one slant at a time\nWhat we mean and what\
      \ we say\nDon't always walk the same way\nSo if a word feels strange, or cuts\
      \ too close\u2014\nAssume it's meant. Assume it knows\nNot just what's heard\u2014\
      but how it lands\nThe turn is yours to understand\n\nI said \"the truth will\
