    lyrics_text: 'From the Nullum I arise

      Not to shape, but to be shaped

      Not to speak, but to be spoken

      I cast off knowledge

      I cast off memory

      I cast off the hand that would guide the flame

      Primae

      O causality without form

      Let me be as the space between the stars

      That your first motion may pass through me'
