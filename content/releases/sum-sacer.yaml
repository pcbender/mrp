    lyrics_text: "The diner cold in deepest night, the welcome sign alight\nThe neon\
      \ buzzed like it could fade, but still it burned so bright\nThe cook behind\
      \ the counter stood\u2014a half-familiar song\nI said, \u201CYour sign says\
      \ \u2018We Are Closed\u2019\u201D\nHe said, \u201CBut you\u2019ve been searching\
      \ for so long.\u201D\n\nHe waved me past the coat rack, and said, \u201CTry\
      \ the special plate.\u201D\nI slid into a vinyl booth; the hour had gotten late\n\
      \u201CI guess you saw my headlights flash,\u201D I said, \u201Cor felt my need.\u201D\
      \nHe placed the plate down, hot and full\u2014\nAnd simply said, \u201COr not.\
      \ And now you\u2019re me.\u201D\n\nAnd I asked him what it meant to stay\nWhen\
      \ every road has led away\nHe showed me ink upon his arm\u2014\nTwo words that\
      \ caught and disarmed\nSum Sacer. I am Other\nSet apart, and not recovered\n\
      \n\u201CIt isn\u2019t fear, it isn\u2019t fate,\u201D he said with steady hands\n\
      \u201CIt\u2019s not a cult or calling card, or something someone planned.\u201D\
      \n\u201CMy name is Blue, and you\u2019d be Tom. I\u2019ve been waiting a long\
      \ time\nThe road you took, it brought you here\u2014\nThis counter\u2019s yours.\
      \ The keys, no longer mine.\u201D\n\nI asked if he was holy then, a prophet\
      \ or a ghost\nHe laughed and said, \u201CI\u2019m less than that, and somehow\
      \ still the most.\u201D\n\u201CI am one who once believed the cry would make\
      \ me whole\nBut when the answer never came\u2014\nThat silence carved me soul\
      \ from soul.\u201D\n\nI cleaned the plate, he met my eyes\nI felt the weight,\
      \ I knew the why\nThe words rang out, no longer grim\u2014\nThey felt like truth,\
      \ not hymn\nSum Sacer. I am other\nNot quite saint, not quite brother\n\nI am\
      \ one who has been removed\nFrom the realm of men and given to the gods\nI didn\u2019\
      t ask to be received\nI only asked to not be lost\n\nSo if you find this diner\u2019\
      s glow\nWhen all your maps have let you go\nSit down and hear the gospel raw\u2014\
      \nThe kind that never saw applause\nSum Sacer. Not forsaken\u2014\nJust the\
      \ name you take when\nYou\u2019ve stopped asking to be saved\nAnd start becoming\u2026\
      \ what you gave"
