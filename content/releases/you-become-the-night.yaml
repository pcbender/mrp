    lyrics_text: "The overcast stillness takes its toll upon my prose\nA constant\
      \ ticking of the clock acts as if it knows\nSome other senseless parable you\
      \ shape until it flows\nIn the end it matters not - the music always goes\n\n\
      When you finally decide to open your eyes\nLet go the dreams you keep locked\
      \ inside\nThe fears overtake but the darkness provides\nWhere the truth that\
      \ you fear has nowhere to hide\nYou become the night\nYou become the night\n\
      \nYou feel the tether pulling tight, a thread the night bestows\nA silent force\
      \ that shapes your name in ways you never chose\nYou fear the shape you\u2019\
      re turning into - only darkness knows\nBut even running from yourself still\
      \ takes you where it goes\n\nWhen you finally decide to open your eyes\nLet\
      \ go the dreams you keep locked inside\nThe fears overtake but the darkness\
      \ provides\nWhere the truth that you fear has nowhere to hide\nYou become the\
      \ night\nYou become the night\n\nHe told me I would find my voice before the\
      \ waiting crowd\nBut not the where or when or how, just \u201Cspeak your truth\
      \ aloud\u201D\nThese many years the echo stayed - both blessing and a shroud\n\
      I lived my life and waited still, for what the night allowed\n\nWhen you finally\
      \ decide to open your eyes\nLet go the dreams you keep locked inside\nThe fears\
      \ overtake but the darkness provides\nWhere the truth that you fear has nowhere\
      \ to hide\nYou become the night\nYou become the night"
