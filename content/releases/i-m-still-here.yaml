    lyrics_text: 'No

      No, not that


      I know the face they hand me now

      Soft edges, smaller appetite

      A version of me trimmed for comfort

      Neat enough not to make them think

      But I''ve been alive too long for that

      Too long to shrink to fit the frame

      Too long to disappear politely

      Just to make them comfortable


      I''m not done being a full-size person

      I''m not done taking up my space

      You don''t get to round me off

      Because it makes your life easier

      I may be slower, I may be sore

      I may have less to prove these days

      But don''t mistake worn down for gone

      Not me


      I can feel the pull toward silence

      Toward the chair against the wall

      Toward becoming manageable

      To everybody after all

      But something in me still gets up

      Still says my name like it means it

      Still wants the hard shape of my life

      Back inside my own two hands


      I''m not done being a full-size person

      I''m not done taking up my space

      You don''t get to round me off

      Because it makes your life easier

      I may be slower, I may be sore

      I may have less to prove these days

      But don''t mistake worn down for gone

      Not me


      I can bend without surrender

      I can age without agreeing

      To become less real

      Less sharp

      Less seen

      (less seen)


      I''m not done being a full-size person

      I''m not done stepping into frame

      You don''t get to write me gentle

      If that''s not who I am today

      I may be marked up, I may be tired

      I may not move the way I did

      But don''t mistake less easy for less alive

      Not me


      Not me

      Yeah

      Not me'
