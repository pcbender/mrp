    lyrics_text: 'Morning again

      All right


      Coffee in a chipped cat mug

      Bird at the fence, same crooked limb

      A breeze talking to itself

      Sun laying quiet on the walk

      Nothing here would make the news

      Nothing here would prove a thing

      Still I stand inside this hour

      Like it matters that I''m seeing it


      I''m still here to witness

      That''s not nothing now

      Still here for the ordinary light

      Still here when the body argues

      Still here when the losses speak

      Still here taking it in

      I''m still here


      I used to think survival

      Would feel louder than this does

      More like thunder, more like victory

      Something like redemption

      But mostly it feels local

      A breath, a chair, a window, rain

      And the strange good fact

      That I can still be moved by any of it


      I''m still here to witness

      That''s not nothing now

      Still here for the ordinary light

      Still here when the names blur

      Still here when the nights run long

      Still here, and today is enough

      I''m still here


      And maybe that is all a life can ask

      To stay awake inside itself

      To lose and lose and still not leave

      The world entirely to someone else

      (mm)

      To someone else


      I''m still here to witness

      That''s enough for now

      Still here for the ordinary light

      Still here with what is broken

      Still here with what is good

      Still here, still looking at it

      I''m still here


      Still here

      Morning again

      Still here

      Mm'
