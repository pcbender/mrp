    instrumental: false
    lyrics_text: "Mm\nNo, that's not\u2014\nYep, that's me\n\nCaught myself in the\
      \ black phone screen\nArm half raised, just passing through\nBad light, wrong\
      \ angle, tired face\nBut it wasn't bad light, it was true\nI stood there longer\
      \ than I should\nLike I'd been called into another room\nSame kitchen, same\
      \ coffee cup\nSame day, but something changed at noon\n\nNobody said a word\n\
      Nothing dramatic happened\nJust one small thought\nLanding where it hadn't\n\
      \nI didn't trip, I didn't fall\nDidn't hear some distant call\nIt was quieter\
      \ than that\nJust a shift I couldn't fight\nSomething in me turned and looked\n\
      And didn't look away this time\nI stood there thinking, clear as day\nI'm old\
      \ now\n\nI went upstairs for something small\nForgot it halfway up the steps\n\
      Laughed it off like people do\nLike a harmless little bit\nBut later on while\
      \ brushing teeth\nI watched my face arrange itself\nLike it was trying to stay\
      \ polite\nWhile telling me something else\n\nNot dying, not done\nNot giving\
      \ up the keys\nJust losing the right\nTo say this happens gradually\n\nI didn't\
      \ trip, I didn't fall\nDidn't hear some distant call\nIt was quieter than that\n\
      Just a shift I couldn't fight\nSomething in me turned and looked\nAnd didn't\
      \ look away this time\nI stood there thinking, clear as day\nI'm old now\n\n\
      I always thought it would arrive\nWith sirens, tests, some bigger proof\nBut\
      \ no, it came like truth comes in\nPlain clothes, standing in my room\nAnd once\
      \ you know it\nYou know it\nOnce it lands\nIt stays\n(yeah, it stays)\n\nI didn't\
      \ trip, I didn't fall\nDidn't lose my name at all\nI'm still in here, I know\
      \ that much\nBut something changed tonight\nAll the years I kept ahead\nAre\
      \ suddenly at my side\nAnd I can say it if I have to\u2026\nI'm old now\n\n\
      Mm\nI'm old now\nYeah\nI'm old now"
    lyrics_source: https://docs.google.com/document/d/1g_XgrSIW2M-jUobE4fZjBSDpVIB-2oT3jdjMXgPm7rI/edit
  - number: 2
    title: Slow Down
    slug: slow-down
    isrc: SE6QE2670829
    duration: '3:25'
    explicit: false
    preview_audio: null
    links:
      apple_music: https://music.apple.com/us/album/slow-down/6770845926?i=6770845931
