    lyrics_text: 'What am I for

      If not that


      I spent my life being useful

      That was the bargain all along

      Show up, fix it, carry what''s heavy

      Keep it moving, don''t let it stop

      And people love a steady hand

      Until they don''t need one anymore

      Then all that praise gets packed away

      With the tools behind the door


      If I can''t do what I used to do

      If I can''t be who I''ve always been

      If the need for me gets smaller

      What''s left when that feeling ends

      Don''t hand me something clean and easy

      Don''t try to soften this

      Who am I when I''m not needed

      That''s the question


      There are days the phone stays silent

      And I pretend the silence fits

      There are days I offer help too fast

      Just to feel connected still

      To something, someone, any proof

      I still matter in the room

      Underneath that decent face

      There''s a fear I can''t get through


      If I can''t do what I used to do

      If I can''t be who I''ve always been

      If the need for me gets smaller

      What''s left when that feeling ends

      Don''t hand me something clean and easy

      Don''t try to soften this

      Who am I when I''m not needed

      That''s the question


      Maybe work became my language

      And the tools became my will

      Maybe that''s why this feels so close

      To moving while standing still


      If I can''t do what I used to do

      If I can''t be who I''ve always been

      If usefulness became my mirror

      What''s left when that feeling ends

      Don''t hand me something clean and easy

      Don''t try to soften this

      Who am I when I''m not needed

      That''s the question


      That''s the question

      Mm

      That''s the question'
