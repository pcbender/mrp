    lyrics_text: "Cracked ground, open sky\nWaited years for a reason why\nDry roots,\
      \ empty hands\nStill I stood on the endless sand\n\nThen the wind turned soft\
      \ and strange\nSmell of hope on the edge of change\n\nHere comes the rain \u2014\
      \ no intention at all\nI open my arms and hope for the fall\nCould wash me clean\
      \ or carry me far\nOr just show me what you really are\nHere comes the rain\
      \ \u2014 I won't run this time\nI'll face what falls and call it mine\n\nClouds\
      \ swell in the rising dust\nOld thoughts buried start to rust\nTruth comes slow\
      \ as the flood begins\nIt doesn't ask \u2014 it just rushes in\n\nAnd every\
      \ drop a choice I make\nTo build again or let it break\n\nHere comes the rain\
      \ \u2014 no intention at all\nNo promise to rise, no warning call\nCould drown\
      \ the past or be a spark\nOf something growing in the dark\nHere comes the rain\
      \ \u2014 I'll let it fall\nWhatever it brings, I'll take it all\n\nIt's not\
      \ the rain that writes the tale\nIt's what I think of storm and hail\nNot what\
      \ it takes, but what remains\nNot what it breaks, but what sustains\n\nHere\
      \ comes the rain \u2014 no intention at all\nNo curse, no crown, no rise, no\
      \ fall\nCould wash me clean or leave a scar\nEither way, I've come this far\n\
      Here comes the rain \u2014 I'm still here\nAnd every drop is crystal clear\n\
      \nHere comes the rain \u2014 no intention at all"
