    lyrics_text: "She says, \u201CBaby, it\u2019s simple,\u201D with a look in her\
      \ eye\nThen she changes the weather while I\u2019m still asking why\nOne minute\
      \ she\u2019s thunder, next minute she\u2019s silk\nI\u2019m standing in the\
      \ kitchen turning coffee into milk\n\nShe says I don't listen, I say she talks\
      \ in smoke\nEvery answer's got a sparkle and a hidden little joke\nI\u2019m\
      \ trying to read the signal, trying to catch the drift\nBut every time I grab\
      \ the handle, she gives it one more twist\n\nI can\u2019t quite make it fit\n\
      No matter how I turn it\nThis piece of my life got a fire in it, baby\nAnd I\
      \ can\u2019t quite make it fit\nHer love, this world, my mind\nI\u2019m looking\
      \ for the edges, but they keep on moving\nAnd I can\u2019t quite make it fit\n\
