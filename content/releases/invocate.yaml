    lyrics_text: "Before it was, it never was\nThe jukebox plays before it\u2019s\
      \ pushed\nA look, a glance, another chance\nThe song repeats\u2014an ancient\
      \ dance\n\nDominos fall in all directions\nThe window sees its own reflections\n\
      The clock unwinds its second hand\nWe march in time without a band\n\nIt echoes\
      \ in the act of trying\nThe shape is formed by what relays\nWe are the tune\
      \ that hums itself\nThe thread in knots as it obeys\n\nEach beginning has beginnings\n\
      And every ending still pretends\nNothing ever really starts\nIt only loops,\
      \ then shifts and bends\nThe road behind is ever long\nThe path ahead pretends\
      \ to end\nAnd we who choose to wander\nTrace the shape we apprehend\n\nNot cause,\
      \ not fate and not effect\nThe mirror breaks but still reflects\nI move before\
      \ I make the choice\nThe echo carves, it gives a voice\n\nIt echoes in the act\
      \ of trying\nThe shape is formed by what relays\nWe are the tune that hums itself\n\
      The thread in knots as it obeys\n\nEach beginning has beginnings\nAnd every\
      \ ending still pretends\nNothing ever really starts\nIt only loops, then shifts\
      \ and bends\nThe road behind is ever long\nThe path ahead pretends to end\n\
      And we who choose to wander\nTrace the shape we apprehend"
