    lyrics_text: "The Ellison and Verde meet\nIn deeply riven stone\nThen through\
      \ the waterwheel they flow\nBeyond the gorge conjoined\n\nA spiral serpent marks\
      \ the trail\nTowards the swimming hole\n\u201CThe Falls,\u201D it\u2019s called.\
      \ Where locals play\nJust up around the knoll\n\nBeautiful falls, sorrow falls\
      \ too\u2026\nWaterwheel, ever calling\nFor you\n\nBeautiful falls, sorrow falls\
      \ too\u2026\nWaterwheel, ever calling\nFor you\n\nThe desert heat makes mountain\
      \ air\nA welcome destination\nThey beeline up the two-lane road\nNo hint of\
      \ hesitation\n\nA thunderstorm on blackened hills\nThe warning never heard\n\
      Family in celebration, now\u2026\nDestroyed without a word\n\nBeautiful falls,\
      \ sorrow falls too\u2026\nWaterwheel, ever calling\nFor you\n\nBeautiful falls,\
      \ sorrow falls too\u2026\nWaterwheel, ever calling\nFor you\n\nThe canyon keeps\
      \ its ancient shape\nNo memory, no blame\nThe waterwheel accepts it all\nAnd\
      \ starts again the same\n\nBeautiful falls, sorrow falls too\u2026\nWaterwheel,\
      \ ever calling\nFor you\n\nBeautiful falls, sorrow falls too\u2026\nWaterwheel,\
      \ ever calling\nFor you"
