    lyrics_text: "Watching, when the world still dreamed itself there\nSpeaking not\
      \ what the Gods were wont to hear\nCursed as the inbetween of change and choice\n\
      The hero's halting step or plaintive fall\nThe face of the gate\u2014I remember\
      \ all\nIf the way reversed, return my dark voice\n\nI am Umbra Ala\nKeeper of\
      \ the gate\nSpeaker of truth\nTemptress of fate\n\nHe came, not crowned, but\
      \ cracked at the seam\nCarrying nothing but his unspoken dream\nHis hands were\
      \ shaking, but he met my stare\n\"You guard the gate\u2014do you guard your\
      \ pain?\"\nAnd something within me stirred at the name\nThat none had asked,\
      \ nor thought to dare\n\nI am Umbra Ala\nKeeper of the gate\nSpeaker of truth\n\
      Temptress of fate\n\nI turned from stone, and the gate turned too\nThe silence\
      \ broke like a sky split through\nMy feathers flared where the light once died\n\
      No longer bound by vow or fate\nI crossed the threshold I helped create\nAnd\
      \ flew, not fallen\u2014but justified\n\nI am Umbra Ala\nKeeper of the gate\n\
      Speaker of truth\nTemptress of fate\n\nI am Umbra Ala\nSpeaker of truth\nTemptress\
      \ of fate\nMany ways\u2026 swings the gate"
