    lyrics_text: "If joy were just a lover\u2019s kiss\nThe tenderness of sweet caress\n\
      Of hearts entwined without egress\nYet even this cannot quite be\n\n\u2018Cause\
      \ something less would joy then be\nSomething less would joy then be\n\nIf joy\
      \ were just a rising sun\nUnfolding light for everyone\nA golden hush the day\
      \ begun\nYet even this cannot quite be\n\n\u2018Cause something less would joy\
      \ then be\nSomething less would joy then be\n\nIf joy were just a voice in song\n\
      A chorus wide, a note held long\nA trembling chord that shakes the sea\nYet\
      \ even this cannot quite be\n\n\u2018Cause something less would joy then be\n\
      Something less would joy then be\n\nIf joy were just a peaceful place\nA quiet\
      \ room, a soft embrace\nA hush where even dreams can flee\nYet even this cannot\
      \ quite be\n\n\u2018Cause something less would joy then be\nSomething less would\
      \ joy then be\n\nIf joy were just the grace of God\nA mercy given with a nod\n\
      A light untouched by blasphemy\nYet even this cannot quite be\n\n\u2018Cause\
      \ something less would joy then be\nSomething less would joy then be\n\nNot\
      \ lover, light, nor song nor peace\nNot even what we think is grace\nBut joy\
      \ the echo, not the sound\nThe shape we chase is never found"
