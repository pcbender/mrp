    lyrics_text: 'Just before the closing door


      Everything I’ve ever known

      Waits behind the closing door

      Out of reach and just beyond

      A whisper less, a meaning more


      When you see with closed eyes

      The image never lies

      The spirit dares to fly

      Hesitation denies the climb

      As you find the last reprise

      Of the song that never dies


      I skipped a step, fell out of line

      Chased a dream I’d dreamed before

      The echo sings but out of time

      Intention rising evermore


      When you see with closed eyes

      The image never lies

      The spirit dares to fly

      Hesitation denies the climb

      As you find the last reprise

      Of the song that never dies


      I reached beyond the final words

      Where silence folds and thoughts expire

      There danced the Curl-unseen, unheard

      A whisper’s ash, untouched by fire


      When you see with closed eyes

      The image never lies

      The spirit dares to fly

      Hesitation denies the climb

      As you find the last reprise

      Of the song that never dies

      Of the soul that never dies


      Hesitation denies (Hesitation denies)

      But the spirit still flies (still flies, still flies)

      Hesitation denies…'
