    lyrics_text: 'In the deep field, I listen

      Not for meaning, but for motion

      Not for pattern, but for pull

      A note unsung hums within me

      A longing. A drawn bow. A vow

      I do not choose it-

      It chooses me

      I give it sanctuary

      I give it witness

      I give it name only so it may be released


      For use with AI music systems (like Suno, Riffusion, or text-to-audio synths),
      you might say


      “Create a ritual invocation piece blending overtone singing, deep analog drone,
      bowed metal textures, and vocal harmonics in just intonation. Minimal melody,
      focus on breath and vibration. Begins in no-form (arrhythmic, dissolved) and
      slowly aligns into resonant coherence. Feels ancient, reverent, and non-verbal-a
      song before the song.”


      Or shorter, for style prompt


      “Primal ritual drone, overtone chant, bowed metal, no-form dissolving into harmonic
      pulse, reverent and timeless.”'
