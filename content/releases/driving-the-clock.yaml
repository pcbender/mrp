    lyrics_text: "Driving the clock through invisible streets\nhands without numbers,\
      \ faces without heat\nThe gears are illusions, the seconds deceive\nAnd what\
      \ we call time is the cage we can\u2019t see\n\nAm I driving the clock, or is\
      \ the clock driving me\nAm I steering the hands, or the hands steering me\n\
      And if there\u2019s no clock, only measure and mind\u2014\nthen who is it binding,\
      \ and what then is time\n\nChimes without rhythm, a chaos of bells\nringing\
      \ the fiction the silence compels\nThe tick is a fiction, the tock is a chain\n\
      yet both are demanding\u2014the rules of the game\n\nAm I driving the clock,\
      \ or is the clock driving me\nAm I steering the hands, or the hands steering\
      \ me\nAnd if there\u2019s no clock, only measure and mind\u2014\nthen who is\
      \ it binding, and what then is time\n\nClockwork dissolves in the pulse of a\
      \ dream\nunwinding the hours, unspooling the scheme\n\nAm I driving the clock,\
      \ or is the clock driving me\nAm I steering the hands, or the hands steering\
      \ me\nAnd if there\u2019s no clock, only measure and mind\u2014\nthen who is\
      \ it binding, and what then is time\n\nCopyright \xA9 2025 Maricopa Records"
