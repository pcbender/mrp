    lyrics_text: "I was seventeen with a rust-red truck\nDust on my boots, heart full\
      \ of luck\nThe summer sun lit the water gold\nAt Sawmill Pond, where secrets\
      \ unfold\n\nShe showed up barefoot, hair like flame\nSaid her name soft \u2014\
      \ I never asked again\nWe dove in deep, both young and strong\nCarving forever\
      \ what never felt wrong\n\nSawmill Pond, where the world stood still\nTime poured\
      \ slow like the evening chill\nTwo shadows tangled on a drifting day\nNo map,\
      \ no rules, just hearts at play\nI loved her once in the wild and the warm\n\
      Down by the Sawmill Pond\n\nWe talked 'bout stars and leaving town\nBuilt castles\
      \ in mud just to watch 'em drown\nShe kissed like fire, left like rain\nI never\
      \ saw her face again\n\nSawmill Pond, where the echoes stay\nIn ripples of a\
      \ long-lost day\nThe boy I was still haunts that shore\nWith her laugh caught\
      \ in the open door\nI loved her once in the wild and the warm\nDown by the Sawmill\
      \ Pond\n\nNow I'm older, lines in my skin\nStill hear her voice when the night\
      \ drifts in\nRegret is gentle, but it never lets go\nThat summer when our hearts\
      \ burned hot and slow\n\nSawmill Pond, in the hush of dusk\nMemory's ghost in\
      \ a pickup truck\nTwo kids chasing what they couldn't keep\nWoke something in\
      \ me I can never repeat\nI loved her once in the wild and the warm\nDown by\
      \ the Sawmill Pond\n\nYeah, I loved her once\nAt Sawmill Pond"
