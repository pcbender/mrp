    lyrics_text: "I traced the lines of maybe on the walls I used to know\nBuilt a\
      \ house of hesitation from the things I wouldn\u2019t show\nI told myself it\u2019\
      s safer not to reach beyond the past\nWhere \u201CNever Only After\u201D seemed\
      \ much better than the crash\n\n\u201CNever Only After\u201D becomes a shuttered\
      \ door\nA place where you can hide\nAnd lock yourself inside\n\u201CEver Only\
      \ After\u201D is an offer to explore\nThe courage to try\u2014\nWhere **your**\
      \ dreams reside\u2026\n\u201CEver Only After\u201D\n\nIf the setting of the\
      \ sun should lose its rosy hue\nThe nighthawk\u2019s call forgets the sadness\
      \ it alone once knew\nThe twinkling stars refuse to move in transit \u2019cross\
      \ the sky\nThen \u201CEver Only After\u201D will I stop and wonder why\n\nAs\
      \ days dissolve and seasons fly like moments in the rain\nThe cadence of a distant\
      \ song still longing for refrain\nMy eyes of love look past the years in morning\u2019\
      s sweet review\nThen \u201CEver Only After\u201D will I share myself with you\n\
      \nIn the chaos of \u201Cor,\u201D we lost what we were for\u2026\nUntil \u201C\
      Ever Only After\u201D\nUnlocked the shuttered door\u2026\n\u201CEver Only After\u201D"
