    lyrics_text: "I\u2019ve come to say the final line\nTo lay you down, with words\
      \ said kind\nThey say you're dead, and that is true\nBut I still feel the weight\
      \ of you\n\nI spoke in threads, I praised your fame\nIgnored the parts that\
      \ cut like blame\nI wore conviction like a crown\nBut always made a hollow sound\n\
      \nThis is my allocution\nMy final claim to light\nI told the world my truth\n\
      And hoped it sounded right\nBut now the silence answers\nWith something I can't\
      \ fake\nThis is my allocution\u2014\nAnd I may be too late\n\nYou spoke your\
      \ truth, but I remain\nNot loud, not lost\u2014and not a claim\nI do not beg.\
      \ I do not bend\nI am the means, not just the end\n\nYou shouted facts like\
      \ they were fire\nBut I am neither loud nor dire\nI am the hand, the root, the\
      \ light\nWhat\u2019s left after the endless fight\n\nThis is my allocution\n\
      Not carved in stone or light\nI am the one that listens\nTo what you cannot\
      \ write\nI am the quiet answer\nTo questions you won't ask\nThis is my allocution\u2014\
      \nNo spotlight, and no mask\n\nI am the simple way, like water over stone\n\
      I never shout\u2014I shape what\u2019s left alone\nBut you\u2014\nYou choose\
      \ the noise, the brighter course\nAnd cursed the stream that held no force\n\
      I offered ease\nYou asked for more\nAnd still I wait behind the door\n\nThis\
      \ is the allocution\nNot to convince, but see\nNot to be right, but reckon\n\
      With what we'll never be\nThere is no clean conclusion\nNo sermon to recite\n\
      Only this allocution\u2014\nTo say it\nAnd be quiet"
