      \ lost the things that do not matter\n\nI slipped the coil, made the beggars\u2019\
      \ plea\nThat when I ask your charity is free\nI missed the line that\u2019s\
      \ never drawn in ink\nWhich separates the thing from what I think\n\nI go on\
      \ though the ending\u2019s always near\nWith cracked beliefs I cradle like they\u2019\
      re clear\nEach dawn I greet with hope I can\u2019t defend\u2014\nA stubborn\
      \ flame that flickers to pretend\n\nOh, would the stars appear to sketch the\
      \ night\nBring down the dark within the grasp of light\nAnd sing the tune assembled\
      \ for the flight\nThat leaves us breathless, longing for what\u2019s right\n\
