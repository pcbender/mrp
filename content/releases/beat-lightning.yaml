    lyrics_text: "Double down in chocolate town\nWhat goes around is lost not found\n\
      Slipstream dreams in neon haze\nCounting backwards through the blaze\n\nTriple\
      \ dare can't compare\nWhen nothing's there you're unaware\nCracked facade on\
      \ Tuesday's face\nTruth evaporates without a trace\n\nIs the song already over\n\
      Or just waiting to begin\nThe hush is loud, the echo thin\u2014\nIs this the\
      \ start, or just beat lightning\n\nSlipping riding peeping hiding\nReally only\
      \ alley darkly\nSnapback shadow, tongue-tied thrill\nBuzzing wires that won't\
      \ sit still\n\nBebop don't stop on top\nFour square don't care nearly there\n\
      Jukebox preacher in a static trance\nSpins one line then breaks the dance\n\n\
      Is the song already over\nOr just waiting to begin\nThe hush is loud, the echo\
      \ thin\u2014\nIs this the start, or just beat lightning\n\nI look behind the\
      \ darkness\nLike it's paint upon a wall\nThe billboards share their secrets\n\
      Which they swear I can't recall\n\nWhen the alley bares its soul\nAnd the dawn\
      \ begins to stall\nAre the cobblestone confessions\nA reminder to us all\n\n\
      Is the song already over\nOr just waiting to begin\nThe hush is loud, the echo\
      \ thin\u2014\nIs this the start, or just beat lightning\n\nThe wild mind returns\
      \ the stare\nAnd splits the diff from here and there\nThe shimmer of the silence\
      \ asks\nThe question once again\n\nIs the song already over\nOr just waiting\
      \ to begin\nThe hush is loud, the echo thin\u2014\nIs this the start, or just\
      \ beat lightning\n\nI'm spent, money's gone\nNothin' left, gettin' on\nOne shoe\
      \ tied, the other draggin'\nPast the dream that's still just laggin'\n\nBut\
      \ broke men float when rhythm's tight\u2014\nJust catch the beat and steal the\
      \ night"
