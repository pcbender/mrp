    lyrics_text: Progressive Rock, Symphonic Prog, early 70s art rock in F Major.
      Keyboard/Guitar power quartet with aggressive Hammond organ, modular Moog leads,
      grand piano interludes, overdriven electric guitar, overdriven bass guitar played
      melodically, and highly technical drumming with rapid fills and cymbal splashes.
      Mostly 4/4 with brief excursions into 7/8 and 5/4 during transitions and instrumental
      passages. Dramatic dynamic contrasts between restrained verses and explosive
      choruses. Male lead vocal with rich baritone tone, theatrical phrasing, tight
      harmonized backing vocals in the choruses. Intricate counterpoint between organ
      and bass. Classical-inspired chord movement, chromatic passing tones, suspended
      harmonies, syncopated rhythmic accents. Instrumental bridge expands into a virtuosic
      organ and guitar duel with shifting meters and descending piano figures. Warm
      analog tape saturation, wide stereo image, punchy tom-heavy drum mix, bright
      Hammond overdrive, vintage studio reverb
