    lyrics_text: "Compass spinning, sky unwinds\u2026\nI'm the Wayfinder\nInto the\
      \ inside\u2026\n\nI set my boots on open ground\nWith a compass that can't settle\
      \ down\nI thought I traced the boundary clear\nBut all my steps just disappear\n\
      \nThe caves grew deeper as I drew\nThe canyons wider than I knew\nI mapped the\
      \ cracks, I named the stones\nBut lost the path back to my own\n\nI'm the Wayfinder,\
      \ lost and blind\nCharting caves and canyons wide\nNo rope can hold, no star\
      \ can guide\nI'm the Wayfinder\nInto the inside\u2026\n\nI measured deep a canyon\
      \ fair\nWith fractured stone beyond repair\nI staked the walls, I timed the\
      \ fall\nBut found no way to bridge it all\n\nThe caves I marked with careful\
      \ light\nStill swallowed years beyond my sight\nI mapped the faults, I named\
      \ the scars\nBut every line still moved too far\n\nI'm the Wayfinder, torn and\
      \ tied\nCharting caves and canyons wide\nNo rope can hold, no stone can hide\n\
      I'm the Wayfinder\nInto the inside\n\nI dropped the compass in the dust\nLet\
      \ go the rope, forgot the trust\nThe caves, the canyons, all grew still \u2014\
      \nI found no map\nI found my will\n\nI'm the Wayfinder, tested and tried\nLiving\
      \ caves and canyons wide\nNo rope, no chart, no need to hide\nI'm the Wayfinder\n\
      Out of the inside\n\nCompass still\nSky unwinds\nI walk the map I've left behind"
